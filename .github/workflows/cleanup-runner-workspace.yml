name: Cleanup Runner Workspace

on:
  workflow_dispatch:
    inputs:
      repo_workspace:
        description: 'Repository workspace directory under the runner _work folder'
        required: true
        type: string

jobs:
  cleanup:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    steps:
      - name: Remove stale workspace
        shell: bash
        run: |
          set -euo pipefail

          repo_workspace="${{ inputs.repo_workspace }}"
          if [[ ! "$repo_workspace" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid repo_workspace: $repo_workspace"
            exit 1
          fi

          work_root="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
          target="$work_root/$repo_workspace"

          if [ "$target" = "$work_root" ] || [ "$target" = "/" ]; then
            echo "::error::Refusing to remove unsafe target: $target"
            exit 1
          fi

          echo "Removing stale runner workspace: $target"
          rm -rf -- "$target"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only. Runs after the job regardless of outcome. No-ops when
  # NOTIFY_WEBHOOK_URL is unset; never fails the workflow.
  notify:
    name: Notify Teams
    needs: [cleanup]
    if: always()
    runs-on: [self-hosted, Linux]
    steps:
      - name: Post result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ github.workflow }} — ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }}", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${STATUS}" },
                    { "title": "Workflow", "value": "${{ github.workflow }}" },
                    { "title": "Trigger", "value": "${{ github.event_name }}" },
                    { "title": "Actor", "value": "${{ github.actor }}" }
                  ] }
                ],
                "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }]
              }
            }]
          }
          JSON
