# =============================================================================
# Neonbee — Reusable Backend Deploy Workflow (NestJS + PM2)
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-backend.yml
#
# Architecture (CLAUDE.md Rule 0 — NON-NEGOTIABLE):
#   Contabo runner: gate → contract-tests + integration-tests → build → rsync dist/
#   Target VM    : receives dist/ only → pm2 reload (ZERO build/install on VM)
#
# Blue/Green additions (layered on top of live base pattern):
#   - dist-prev backup before overwrite (enables 30-sec rollback)
#   - .slot file tracks active slot
#   - Pushgateway metric pushed via SSH to Internal Tools VM
# =============================================================================

name: Deploy Backend (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'e.g. crm-be, core, inventory-be'
        required: true
        type: string
      service_dir:
        description: 'Absolute path on VM e.g. /github/neonbee/so360-crm-be'
        required: true
        type: string
      port_dev:
        required: true
        type: number
      port_staging:
        required: true
        type: number
      health_path:
        required: false
        type: string
        default: '/health'
      node_version:
        required: false
        type: string
        default: '22'
      extra_env_dev:
        description: 'Extra env vars for dev (KEY=value lines, one per line)'
        required: false
        type: string
        default: ''
      extra_env_staging:
        description: 'Extra env vars for staging (KEY=value lines, one per line)'
        required: false
        type: string
        default: ''
    secrets:
      CONTABO_SSH_KEY:              { required: true }
      DIGITALOCEAN_SSH_KEY:         { required: true }
      SERVER_IP:                    { required: true }
      INTERNAL_TOOLS_VM:            { required: false }
      SUPABASE_URL:                 { required: false }
      SUPABASE_ANON_KEY:            { required: false }
      SUPABASE_SERVICE_KEY:         { required: false }
      JWT_SECRET:                   { required: false }
      CORS_ORIGINS_DEV:             { required: false }
      SUPABASE_URL_STAGING:         { required: false }
      SUPABASE_ANON_KEY_STAGING:    { required: false }
      SUPABASE_SERVICE_KEY_STAGING: { required: false }
      JWT_SECRET_STAGING:           { required: false }
      CORS_ORIGINS_STAGING:         { required: false }
      ENCRYPTION_KEY:               { required: false }
      PAT_TOKEN:                    { required: false }
      # Bunny CDN (media uploads — projects, people-connect, etc.)
      BUNNY_STORAGE_HOSTNAME:       { required: false }
      BUNNY_STORAGE_ZONE:           { required: false }
      BUNNY_ACCESS_KEY:             { required: false }
      BUNNY_PULL_ZONE_URL:          { required: false }
      BUNNY_PREFIX:                 { required: false }
      # Cloudflare R2 (document storage — documents-be, sign, etc.)
      CF_R2_ACCOUNT_ID:             { required: false }
      CF_R2_ACCESS_KEY_ID:          { required: false }
      CF_R2_SECRET_ACCESS_KEY:      { required: false }
      CF_R2_BUCKET:                 { required: false }
      CF_R2_PUBLIC_URL:             { required: false }
      CF_R2_PREFIX:                 { required: false }
      # Inter-service auth keys
      INTERNAL_SERVICE_KEY:         { required: false }
      EMAIL_INTERNAL_KEY:           { required: false }
      STOREFRONT_INTERNAL_OPS_KEY:  { required: false }
      MOBILITY_INTERNAL_KEY:        { required: false }
      CHAT_INTERNAL_KEY:            { required: false }
      DOCS_INTERNAL_SERVICE_KEY:    { required: false }
      VAPID_PUBLIC_KEY:             { required: false }
      VAPID_PRIVATE_KEY:            { required: false }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Gate: single merged job ────────────────────────────────────────────────
  gate:
    runs-on: [self-hosted, contabo]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps
      - name: Run unit tests
        env:
          CI: 'true'
        run: npm test -- --passWithNoTests --forceExit --ci
      - name: Lint
        run: npm run lint --if-present
      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev
      - name: Check dependency licenses
        run: >-
          npx license-checker
          --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"
          --excludePrivatePackages
      - name: Scan for secrets
        run: |
          rm -rf dist/ coverage/
          GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            _GL_OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            _GL_ARCH=$(uname -m)
            case "$_GL_ARCH" in x86_64) _GL_ARCH="x64" ;; arm64|aarch64) _GL_ARCH="arm64" ;; esac
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${_GL_OS}_${_GL_ARCH}.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi

  # ── Parallel (both need gate) ──────────────────────────────────────────────
  contract-tests:
    name: API Contract Tests
    runs-on: [self-hosted, contabo]
    needs: [gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps
      - name: Run contract tests
        run: npm run test:contract -- --passWithNoTests --forceExit --ci
        env:
          NODE_ENV: test

  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, contabo]
    needs: [gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps
      - name: Run integration tests
        run: npm run test:integration -- --passWithNoTests --forceExit --ci
        timeout-minutes: 15
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          SO360_AUTH_BYPASS: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_TENANT_ID: '3cf1c619-c8f6-49ac-9207-447418d5beee'
          TEST_ORG_ID: '8317fe18-6ac4-4ac4-b71d-dc13122a905d'
          TEST_USER_ID: '4a1832f4-f7bb-44bf-ad01-9431d8b14efc'

  # ── Build + Deploy (ALL gates must pass) ───────────────────────────────────
  build-deploy:
    needs: [gate, contract-tests, integration-tests]
    runs-on: [self-hosted, contabo]
    timeout-minutes: 20
    concurrency:
      group: neonbee-deploy-${{ inputs.service_name }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Install dependencies and build
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps
          npm run build

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          echo "${{ secrets.CONTABO_SSH_KEY }}" | ssh-add -
          echo "${{ secrets.DIGITALOCEAN_SSH_KEY }}" | ssh-add - 2>/dev/null || true
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # ── Dev ──────────────────────────────────────────────────────────────
      - name: Deploy to Dev
        if: github.ref == 'refs/heads/main'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-dev
          PORT: ${{ inputs.port_dev }}
          HEALTH: ${{ inputs.health_path }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          CURRENT=$(ssh root@$SERVER_IP "cat '$SERVICE_DIR/.slot' 2>/dev/null || echo blue")
          NEW_SLOT=$([[ "$CURRENT" == "blue" ]] && echo green || echo blue)
          echo "Slot: $CURRENT → $NEW_SLOT"

          # Backup dist before overwriting (Blue/Green rollback target)
          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/dist-prev' '$SERVICE_DIR/dist'
            rsync -a --delete '$SERVICE_DIR/dist/' '$SERVICE_DIR/dist-prev/' 2>/dev/null || true
          "

          # Rsync dist/ only — source never touches target VM
          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/dist'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$SERVICE_DIR/dist/"
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' NEW_SLOT='$NEW_SLOT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            npm install --omit=dev --legacy-peer-deps

            # ── Write CI-managed vars ────────────────────────────────────────
            {
              echo "NODE_ENV=development"
              echo "PORT=$PORT"
              echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
              echo "SUPABASE_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
              echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
              echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
              echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS_DEV }}"
            } > .env.ci

            # ── Append optional secrets (only when the GitHub secret is set) ─
            [ -n "${{ secrets.BUNNY_STORAGE_HOSTNAME }}" ]      && echo "BUNNY_STORAGE_HOSTNAME=${{ secrets.BUNNY_STORAGE_HOSTNAME }}"           >> .env.ci
            [ -n "${{ secrets.BUNNY_STORAGE_ZONE }}" ]          && echo "BUNNY_STORAGE_ZONE=${{ secrets.BUNNY_STORAGE_ZONE }}"                   >> .env.ci
            [ -n "${{ secrets.BUNNY_ACCESS_KEY }}" ]            && echo "BUNNY_ACCESS_KEY=${{ secrets.BUNNY_ACCESS_KEY }}"                       >> .env.ci
            [ -n "${{ secrets.BUNNY_PULL_ZONE_URL }}" ]         && echo "BUNNY_PULL_ZONE_URL=${{ secrets.BUNNY_PULL_ZONE_URL }}"                 >> .env.ci
            [ -n "${{ secrets.BUNNY_PREFIX }}" ]                && echo "BUNNY_PREFIX=${{ secrets.BUNNY_PREFIX }}"                               >> .env.ci
            [ -n "${{ secrets.CF_R2_ACCOUNT_ID }}" ]            && echo "CF_R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}"                       >> .env.ci
            [ -n "${{ secrets.CF_R2_ACCESS_KEY_ID }}" ]         && echo "CF_R2_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}"                 >> .env.ci
            [ -n "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" ]     && echo "CF_R2_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"         >> .env.ci
            [ -n "${{ secrets.CF_R2_BUCKET }}" ]                && echo "CF_R2_BUCKET=${{ secrets.CF_R2_BUCKET }}"                               >> .env.ci
            [ -n "${{ secrets.CF_R2_PUBLIC_URL }}" ]            && echo "CF_R2_PUBLIC_URL=${{ secrets.CF_R2_PUBLIC_URL }}"                       >> .env.ci
            [ -n "${{ secrets.CF_R2_PREFIX }}" ]                && echo "CF_R2_PREFIX=${{ secrets.CF_R2_PREFIX }}"                               >> .env.ci
            [ -n "${{ secrets.INTERNAL_SERVICE_KEY }}" ]        && echo "INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}"               >> .env.ci
            [ -n "${{ secrets.EMAIL_INTERNAL_KEY }}" ]          && echo "EMAIL_INTERNAL_KEY=${{ secrets.EMAIL_INTERNAL_KEY }}"                   >> .env.ci
            [ -n "${{ secrets.INBOX_SERVICE_KEY }}" ]           && echo "INBOX_SERVICE_KEY=${{ secrets.INBOX_SERVICE_KEY }}"                     >> .env.ci
            [ -n "${{ secrets.GEMINI_API_KEY }}" ]              && echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"                           >> .env.ci
            [ -n "${{ secrets.OPENAI_API_KEY }}" ]              && echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"                           >> .env.ci
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]           && echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"                     >> .env.ci
            [ -n "${{ secrets.STOREFRONT_INTERNAL_OPS_KEY }}" ] && echo "STOREFRONT_INTERNAL_OPS_KEY=${{ secrets.STOREFRONT_INTERNAL_OPS_KEY }}" >> .env.ci
            [ -n "${{ secrets.MOBILITY_INTERNAL_KEY }}" ]       && echo "MOBILITY_INTERNAL_KEY=${{ secrets.MOBILITY_INTERNAL_KEY }}"             >> .env.ci
            [ -n "${{ secrets.CHAT_INTERNAL_KEY }}" ]           && echo "CHAT_INTERNAL_KEY=${{ secrets.CHAT_INTERNAL_KEY }}"                     >> .env.ci
            [ -n "${{ secrets.DOCS_INTERNAL_SERVICE_KEY }}" ]   && echo "DOCS_INTERNAL_SERVICE_KEY=${{ secrets.DOCS_INTERNAL_SERVICE_KEY }}"     >> .env.ci
            [ -n "${{ secrets.VAPID_PUBLIC_KEY }}" ]            && echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"                       >> .env.ci
            [ -n "${{ secrets.VAPID_PRIVATE_KEY }}" ]           && echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"                     >> .env.ci

            # ── Caller-supplied extra env vars for dev ────────────────────────
            EXTRA_ENV_DEV='${{ inputs.extra_env_dev }}'
            [ -n "$EXTRA_ENV_DEV" ] && printf '%s\n' "$EXTRA_ENV_DEV" >> .env.ci

            # Strip any KEY= lines where the secret wasn't set
            sed -i '/=$/d' .env.ci

            # ── PERMANENT FIX: Merge server-side secrets CI doesn't own ─────
            # Keys already on the server but absent from .env.ci are preserved.
            # This prevents future deployments from silently wiping secrets
            # that were added to the server after the workflow was last updated.
            if [ -f .env ]; then
              CI_KEYS=$(sed 's/=.*//' .env.ci | tr '\n' '|' | sed 's/|$//')
              [ -n "$CI_KEYS" ] && grep -vE "^(${CI_KEYS})=" .env >> .env.ci 2>/dev/null || true
            fi
            mv .env.ci .env

            pm2 stop "$SERVICE_NAME" 2>/dev/null || true
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            sleep 3
            fuser -k "$PORT/tcp" 2>/dev/null || true
            lsof -ti :"$PORT" 2>/dev/null | xargs -r kill -9 2>/dev/null || true
            ss -Hlptn "sport = :$PORT" 2>/dev/null | grep -oP '(?<=pid=)\d+' | sort -u | xargs -r kill -9 2>/dev/null || true
            sleep 2
            MAIN_JS=$(find dist -name main.js | head -1)
            PORT=$PORT pm2 start "$MAIN_JS" --name "$SERVICE_NAME" --cwd "$SERVICE_DIR" --instances 1 --max-memory-restart 400M --update-env
            pm2 save
            HEALTH_PATH="${{ inputs.health_path }}"
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT${HEALTH_PATH}" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "$NEW_SLOT" > .slot
            echo "Deployed $SERVICE_NAME on port $PORT (slot: $NEW_SLOT)"
          DEPLOY_SCRIPT

          # Push deploy metric to Pushgateway on Internal Tools VM (non-fatal)
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
            " 2>/dev/null || true
          fi

      # ── Staging ──────────────────────────────────────────────────────────
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/qa'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-staging
          PORT: ${{ inputs.port_staging }}
          HEALTH: ${{ inputs.health_path }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          CURRENT=$(ssh root@$SERVER_IP "cat '$SERVICE_DIR/.slot' 2>/dev/null || echo blue")
          NEW_SLOT=$([[ "$CURRENT" == "blue" ]] && echo green || echo blue)

          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/dist-prev' '$SERVICE_DIR/dist'
            rsync -a --delete '$SERVICE_DIR/dist/' '$SERVICE_DIR/dist-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/dist'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$SERVICE_DIR/dist/"
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' NEW_SLOT='$NEW_SLOT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            npm install --omit=dev --legacy-peer-deps

            # ── Write CI-managed vars ────────────────────────────────────────
            {
              echo "NODE_ENV=staging"
              echo "PORT=$PORT"
              echo "SUPABASE_URL=${{ secrets.SUPABASE_URL_STAGING }}"
              echo "SUPABASE_KEY=${{ secrets.SUPABASE_ANON_KEY_STAGING }}"
              echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_STAGING }}"
              echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY_STAGING }}"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_KEY_STAGING }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET_STAGING }}"
              echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
              echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS_STAGING }}"
            } > .env.ci

            # ── Append optional secrets (only when the GitHub secret is set) ─
            [ -n "${{ secrets.BUNNY_STORAGE_HOSTNAME }}" ]      && echo "BUNNY_STORAGE_HOSTNAME=${{ secrets.BUNNY_STORAGE_HOSTNAME }}"           >> .env.ci
            [ -n "${{ secrets.BUNNY_STORAGE_ZONE }}" ]          && echo "BUNNY_STORAGE_ZONE=${{ secrets.BUNNY_STORAGE_ZONE }}"                   >> .env.ci
            [ -n "${{ secrets.BUNNY_ACCESS_KEY }}" ]            && echo "BUNNY_ACCESS_KEY=${{ secrets.BUNNY_ACCESS_KEY }}"                       >> .env.ci
            [ -n "${{ secrets.BUNNY_PULL_ZONE_URL }}" ]         && echo "BUNNY_PULL_ZONE_URL=${{ secrets.BUNNY_PULL_ZONE_URL }}"                 >> .env.ci
            [ -n "${{ secrets.BUNNY_PREFIX }}" ]                && echo "BUNNY_PREFIX=${{ secrets.BUNNY_PREFIX }}"                               >> .env.ci
            [ -n "${{ secrets.CF_R2_ACCOUNT_ID }}" ]            && echo "CF_R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}"                       >> .env.ci
            [ -n "${{ secrets.CF_R2_ACCESS_KEY_ID }}" ]         && echo "CF_R2_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}"                 >> .env.ci
            [ -n "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" ]     && echo "CF_R2_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"         >> .env.ci
            [ -n "${{ secrets.CF_R2_BUCKET }}" ]                && echo "CF_R2_BUCKET=${{ secrets.CF_R2_BUCKET }}"                               >> .env.ci
            [ -n "${{ secrets.CF_R2_PUBLIC_URL }}" ]            && echo "CF_R2_PUBLIC_URL=${{ secrets.CF_R2_PUBLIC_URL }}"                       >> .env.ci
            [ -n "${{ secrets.CF_R2_PREFIX }}" ]                && echo "CF_R2_PREFIX=${{ secrets.CF_R2_PREFIX }}"                               >> .env.ci
            [ -n "${{ secrets.INTERNAL_SERVICE_KEY }}" ]        && echo "INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}"               >> .env.ci
            [ -n "${{ secrets.EMAIL_INTERNAL_KEY }}" ]          && echo "EMAIL_INTERNAL_KEY=${{ secrets.EMAIL_INTERNAL_KEY }}"                   >> .env.ci
            [ -n "${{ secrets.INBOX_SERVICE_KEY }}" ]           && echo "INBOX_SERVICE_KEY=${{ secrets.INBOX_SERVICE_KEY }}"                     >> .env.ci
            [ -n "${{ secrets.GEMINI_API_KEY }}" ]              && echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"                           >> .env.ci
            [ -n "${{ secrets.OPENAI_API_KEY }}" ]              && echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"                           >> .env.ci
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]           && echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"                     >> .env.ci
            [ -n "${{ secrets.STOREFRONT_INTERNAL_OPS_KEY }}" ] && echo "STOREFRONT_INTERNAL_OPS_KEY=${{ secrets.STOREFRONT_INTERNAL_OPS_KEY }}" >> .env.ci
            [ -n "${{ secrets.MOBILITY_INTERNAL_KEY }}" ]       && echo "MOBILITY_INTERNAL_KEY=${{ secrets.MOBILITY_INTERNAL_KEY }}"             >> .env.ci
            [ -n "${{ secrets.VAPID_PUBLIC_KEY }}" ]            && echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"                       >> .env.ci
            [ -n "${{ secrets.VAPID_PRIVATE_KEY }}" ]           && echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"                     >> .env.ci

            # ── Caller-supplied extra env vars for staging ────────────────────
            EXTRA_ENV_STAGING='${{ inputs.extra_env_staging }}'
            [ -n "$EXTRA_ENV_STAGING" ] && printf '%s\n' "$EXTRA_ENV_STAGING" >> .env.ci

            # Strip any KEY= lines where the secret wasn't set
            sed -i '/=$/d' .env.ci

            # ── PERMANENT FIX: Merge server-side secrets CI doesn't own ─────
            if [ -f .env ]; then
              CI_KEYS=$(sed 's/=.*//' .env.ci | tr '\n' '|' | sed 's/|$//')
              [ -n "$CI_KEYS" ] && grep -vE "^(${CI_KEYS})=" .env >> .env.ci 2>/dev/null || true
            fi
            mv .env.ci .env

            pm2 stop "$SERVICE_NAME" 2>/dev/null || true
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            sleep 3
            fuser -k "$PORT/tcp" 2>/dev/null || true
            lsof -ti :"$PORT" 2>/dev/null | xargs -r kill -9 2>/dev/null || true
            ss -Hlptn "sport = :$PORT" 2>/dev/null | grep -oP '(?<=pid=)\d+' | sort -u | xargs -r kill -9 2>/dev/null || true
            sleep 2
            MAIN_JS=$(find dist -name main.js | head -1)
            PORT=$PORT pm2 start "$MAIN_JS" --name "$SERVICE_NAME" --cwd "$SERVICE_DIR" --instances 1 --max-memory-restart 400M --update-env
            pm2 save
            HEALTH_PATH="${{ inputs.health_path }}"
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT${HEALTH_PATH}" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "$NEW_SLOT" > .slot
            echo "Deployed $SERVICE_NAME on port $PORT (slot: $NEW_SLOT)"
          DEPLOY_SCRIPT

          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
            " 2>/dev/null || true
          fi

      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}\",env=\"${{ github.ref_name }}\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "Service: ${{ inputs.service_name }} | Branch: ${{ github.ref_name }} | Status: ${{ job.status }}"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only — does NOT change the gate → tests → build → deploy flow (Rule 0).
  # Runs after all jobs regardless of outcome, so gate/test failures are reported too.
  # No-ops silently when NOTIFY_WEBHOOK_URL is unset; never fails the pipeline.
  notify:
    name: Notify Teams
    needs: [gate, contract-tests, integration-tests, build-deploy]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post pipeline result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${GITHUB_SHA:0:8}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ inputs.service_name }} — pipeline ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }}", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${STATUS}" },
                    { "title": "Branch", "value": "${{ github.ref_name }}" },
                    { "title": "Commit", "value": "${SHA}" },
                    { "title": "Trigger", "value": "${{ github.event_name }}" }
                  ] }
                ],
                "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }]
              }
            }]
          }
          JSON
