# =============================================================================
# Neonbee — Reusable Next.js App Deploy Workflow
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-nextjs.yml
#
# Used by: so360-storefront-web-fe, so360-command, so360-mobility-pwa
#
# Architecture (CLAUDE.md Rule 0 — NON-NEGOTIABLE):
#   Contabo runner: gate → build → rsync .next/ + public/
#   Target VM    : receives build output only → pm2 reload (no build on VM)
#
# Note: Next.js build output (.next/ + public/) is rsynced — not raw source.
#       node_modules are NOT rsynced. VM installs --omit=dev at runtime.
#
# Blue/Green additions (layered on top of live base pattern):
#   - .next-prev backup before overwrite (enables 30-sec rollback)
#   - .slot file tracks active slot
#   - Pushgateway metric pushed via SSH to Internal Tools VM
# =============================================================================

name: Deploy Next.js App (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_dir:
        required: true
        type: string
      port_dev:
        required: true
        type: number
      port_staging:
        required: true
        type: number
      node_version:
        required: false
        type: string
        default: '22'
      extra_env:
        description: 'Additional env lines written to .env.local before build'
        required: false
        type: string
        default: ''
    secrets:
      CONTABO_SSH_KEY:      { required: true }
      DIGITALOCEAN_SSH_KEY: { required: true }
      SERVER_IP:            { required: true }
      INTERNAL_TOOLS_VM:    { required: false }
      PAT_TOKEN:            { required: false }

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ── Gate: single merged job ────────────────────────────────────────────────
  gate:
    runs-on: [self-hosted, contabo]
    steps:
      - uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4.3.0
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run unit tests
        env:
          CI: 'true'
        run: npm test -- --passWithNoTests
      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev
      - name: Check dependency licenses
        run: >-
          npx license-checker
          --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"
          --excludePrivatePackages
      - name: Scan for secrets
        run: |
          rm -rf .next/ out/
          GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            _GL_OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            _GL_ARCH=$(uname -m)
            case "$_GL_ARCH" in x86_64) _GL_ARCH="x64" ;; arm64|aarch64) _GL_ARCH="arm64" ;; esac
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${_GL_OS}_${_GL_ARCH}.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi

  # ── Build + Deploy (gate must pass) ───────────────────────────────────────
  build-deploy:
    needs: [gate]
    runs-on: [self-hosted, contabo]
    concurrency:
      group: neonbee-deploy-${{ inputs.service_name }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4.3.0
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Install dependencies and build
        run: |
          EXTRA_ENV='${{ inputs.extra_env }}'
          [ -n "$EXTRA_ENV" ] && echo "$EXTRA_ENV" > .env.local
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the next build (next: not found).
          npm ci --legacy-peer-deps --include=dev
          # Guard against an incomplete node_modules/next (npm ci can finish
          # cleanly yet leave deep next/dist files missing on the Docker fleet).
          # Verify all known sentinels pre-build; self-heal once, then fail fast.
          NEXT_SENTINELS="require.resolve('next/dist/compiled/jest-worker/processChild.js'); require.resolve('next/dist/build/webpack-config'); require.resolve('next/dist/server/route-modules/app-page/module.compiled'); require.resolve('next/dist/build/polyfills/polyfill-nomodule')"
          if ! node -e "$NEXT_SENTINELS" 2>/dev/null; then
            echo "::warning::next package incomplete after npm ci — purging npm cache and reinstalling clean"
            npm cache clean --force
            rm -rf node_modules
            npm ci --legacy-peer-deps --include=dev
            if ! node -e "$NEXT_SENTINELS"; then
              echo "::error::next package STILL incomplete after clean reinstall — runner disk/filesystem is corrupting installs on this slot. Rerun to land on another slot."
              exit 1
            fi
          fi
          npm run build

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.CONTABO_SSH_KEY }}
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      # ── Dev ──────────────────────────────────────────────────────────────
      - name: Deploy to Dev
        if: github.ref == 'refs/heads/main'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-dev
          PORT: ${{ inputs.port_dev }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          CURRENT=$(ssh root@$SERVER_IP "cat '$SERVICE_DIR/.slot' 2>/dev/null || echo blue")
          NEW_SLOT=$([[ "$CURRENT" == "blue" ]] && echo green || echo blue)
          echo "Slot: $CURRENT → $NEW_SLOT"

          # Backup .next before overwriting (Blue/Green rollback target)
          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/.next-prev' '$SERVICE_DIR/.next'
            rsync -a --delete '$SERVICE_DIR/.next/' '$SERVICE_DIR/.next-prev/' 2>/dev/null || true
          "

          # Rsync build output only — .next/ + public/ + package files
          # node_modules and source files are NOT deployed to VM
          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR'"
          rsync -avz --delete --exclude 'node_modules' --exclude '.git' .next/ "root@$SERVER_IP:$SERVICE_DIR/.next/"
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' NEW_SLOT='$NEW_SLOT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            rm -rf node_modules
            npm install --omit=dev --legacy-peer-deps
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT pm2 start npm --name "$SERVICE_NAME" -- start -- -p $PORT --hostname 0.0.0.0
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "$NEW_SLOT" > .slot
            echo "Deployed $SERVICE_NAME on port $PORT (slot: $NEW_SLOT)"
          DEPLOY_SCRIPT

          # Push deploy metric to Pushgateway on Internal Tools VM
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null || true
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
            " || true
          fi

      # ── Staging ──────────────────────────────────────────────────────────
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/qa'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-staging
          PORT: ${{ inputs.port_staging }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          CURRENT=$(ssh root@$SERVER_IP "cat '$SERVICE_DIR/.slot' 2>/dev/null || echo blue")
          NEW_SLOT=$([[ "$CURRENT" == "blue" ]] && echo green || echo blue)

          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/.next-prev' '$SERVICE_DIR/.next'
            rsync -a --delete '$SERVICE_DIR/.next/' '$SERVICE_DIR/.next-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR'"
          rsync -avz --delete --exclude 'node_modules' --exclude '.git' .next/ "root@$SERVER_IP:$SERVICE_DIR/.next/"
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' NEW_SLOT='$NEW_SLOT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            rm -rf node_modules
            npm install --omit=dev --legacy-peer-deps
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT pm2 start npm --name "$SERVICE_NAME" -- start -- -p $PORT --hostname 0.0.0.0
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "$NEW_SLOT" > .slot
            echo "Deployed $SERVICE_NAME on port $PORT (slot: $NEW_SLOT)"
          DEPLOY_SCRIPT

          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null || true
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"${NEW_SLOT}\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
            " || true
          fi

      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}\",env=\"${{ github.ref_name }}\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "Service: ${{ inputs.service_name }} | Branch: ${{ github.ref_name }} | Status: ${{ job.status }}"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only — does NOT change the gate → build → deploy flow (Rule 0).
  # Runs after all jobs regardless of outcome, so gate failures are reported too.
  # No-ops silently when NOTIFY_WEBHOOK_URL is unset; never fails the pipeline.
  notify:
    name: Notify Teams
    needs: [gate, build-deploy]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post pipeline result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${GITHUB_SHA:0:8}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ inputs.service_name }} — pipeline ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }}", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${STATUS}" },
                    { "title": "Branch", "value": "${{ github.ref_name }}" },
                    { "title": "Commit", "value": "${SHA}" },
                    { "title": "Trigger", "value": "${{ github.event_name }}" }
                  ] }
                ],
                "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }]
              }
            }]
          }
          JSON
