# =============================================================================
# Neonbee — Reusable Production Next.js Deploy (PM2)
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-prod-nextjs.yml
#
# Handles:
#   - command (Next.js → INTERNAL_TOOLS_VM)
#   - storefront-web-fe (Next.js → STOREFRONT_PROD_IP)
#   - mobility-pwa (Next.js standalone → PROD_SERVER_IP)
# =============================================================================

name: Deploy Prod Next.js (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'PM2 service name e.g. command-prod, storefront-web-prod'
        required: true
        type: string
      service_dir:
        description: 'Absolute path on target VM e.g. /apps/neonbee/so360-command'
        required: true
        type: string
      port:
        description: 'Production port e.g. 14034'
        required: true
        type: number
      pm2_instances:
        required: false
        type: number
        default: 1
      target_vm:
        description: 'prod | storefront | internal'
        required: false
        type: string
        default: 'internal'
      standalone:
        description: 'Use .next/standalone output (true for mobility-pwa)'
        required: false
        type: boolean
        default: false
      extra_env:
        description: 'Additional .env lines for build-time and runtime'
        required: false
        type: string
        default: ''
      health_path:
        required: false
        type: string
        default: '/'
      node_version:
        required: false
        type: string
        default: '22'
    secrets:
      DIGITALOCEAN_SSH_KEY:          { required: false }
      STOREFRONT_PROD_SSH_KEY:       { required: false }
      PROD_SERVER_IP:                { required: false }
      STOREFRONT_PROD_IP:            { required: false }
      INTERNAL_TOOLS_VM:             { required: false }
      SUPABASE_URL:                  { required: false }
      SUPABASE_ANON_KEY:             { required: false }
      SUPABASE_SERVICE_KEY:          { required: false }
      PAT_TOKEN:                     { required: false }
      VAPID_PUBLIC_KEY:              { required: false }
      VAPID_PRIVATE_KEY:             { required: false }

jobs:

  gate:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests and security checks
        env:
          CI: 'true'
        run: |
          (npm audit --audit-level=critical --omit=dev) &
          AUDIT_PID=$!

          (npx --yes license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" --excludePrivatePackages) &
          LICENSE_PID=$!

          (GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi) &
          GITLEAKS_PID=$!

          npm test -- --passWithNoTests
          TEST_EXIT=$?

          wait $AUDIT_PID; AUDIT_EXIT=$?
          wait $LICENSE_PID; LICENSE_EXIT=$?
          wait $GITLEAKS_PID; GITLEAKS_EXIT=$?

          [ $AUDIT_EXIT -ne 0 ] && echo "::error::Security audit failed"
          [ $LICENSE_EXIT -ne 0 ] && echo "::error::License check failed"
          [ $GITLEAKS_EXIT -ne 0 ] && echo "::error::Secrets scan failed"
          [ $TEST_EXIT -ne 0 ] && echo "::error::Unit tests failed"

          exit $(( TEST_EXIT | AUDIT_EXIT | LICENSE_EXIT | GITLEAKS_EXIT ))

  build-deploy:
    needs: [gate]
    runs-on: self-hosted
    timeout-minutes: 20
    concurrency:
      group: neonbee-prod-deploy-${{ inputs.service_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Install and build
        run: |
          npm ci --legacy-peer-deps

          # Write build-time env
          EXTRA_ENV='${{ inputs.extra_env }}'
          if [ -n "$EXTRA_ENV" ]; then
            echo "$EXTRA_ENV" > .env.local
          fi

          npm run build

      - name: Resolve target VM
        id: vm
        run: |
          case "${{ inputs.target_vm }}" in
            storefront) echo "ip=${{ secrets.STOREFRONT_PROD_IP }}" >> $GITHUB_OUTPUT ;;
            internal)   echo "ip=${{ secrets.INTERNAL_TOOLS_VM }}" >> $GITHUB_OUTPUT ;;
            *)          echo "ip=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT ;;
          esac

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}
            ${{ inputs.target_vm == 'storefront' && secrets.STOREFRONT_PROD_SSH_KEY || '' }}

      - name: Deploy to Production (standard)
        if: "!inputs.standalone"
        env:
          SERVER_IP: ${{ steps.vm.outputs.ip }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          PORT: ${{ inputs.port }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Backup
          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/.next-prev' '$SERVICE_DIR/.next'
            rsync -a --delete '$SERVICE_DIR/.next/' '$SERVICE_DIR/.next-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete --exclude='.env' .next/ "root@$SERVER_IP:$SERVICE_DIR/.next/"
          rsync -avz package.json package-lock.json next.config.ts "root@$SERVER_IP:$SERVICE_DIR/" 2>/dev/null || \
          rsync -avz package.json package-lock.json next.config.mjs "root@$SERVER_IP:$SERVICE_DIR/" 2>/dev/null || \
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$NVM_DIR/versions/node/$(ls $NVM_DIR/versions/node/ 2>/dev/null | sort -V | tail -1)/bin:$PATH"
            npm install --omit=dev --legacy-peer-deps
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT pm2 start npm --name "$SERVICE_NAME" -- start -- -p $PORT
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "Deployed $SERVICE_NAME on port $PORT"
          DEPLOY_SCRIPT

      - name: Deploy to Production (standalone)
        if: inputs.standalone
        env:
          SERVER_IP: ${{ steps.vm.outputs.ip }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          PORT: ${{ inputs.port }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete .next/standalone/ "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz --delete .next/static/ "root@$SERVER_IP:$SERVICE_DIR/.next/static/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name "$SERVICE_NAME" --instances ${{ inputs.pm2_instances }} --max-memory-restart 500M
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "Deployed $SERVICE_NAME (standalone) on port $PORT"
          DEPLOY_SCRIPT

      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM || '' }}
          [ -z "$TOOLS" ] && exit 0
          ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null
          TS=$(date -u +%s)
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}\",env=\"prod\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}
            printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",env=\"prod\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: echo "Service: ${{ inputs.service_name }} | Env: production | VM: ${{ inputs.target_vm }} | Status: ${{ job.status }}"
