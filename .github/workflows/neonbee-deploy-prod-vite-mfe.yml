# =============================================================================
# Neonbee — Reusable Production Vite MFE Deploy (nginx + Cloudflare)
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-prod-vite-mfe.yml
#
# Architecture:
#   Contabo runner: gate → build → rsync dist/ → nginx root on Prod VM
#   Prod VM       : receives static dist/ → nginx reload → CF cache purge
#
# Handles both:
#   - Standard MFEs (checkout shell-fe for @so360/* packages, 4-5 VITE vars)
#   - Shell FE (builds packages internally, 40+ VITE vars, purges all CF)
#   - SSO FE (standalone Vite app, no shell-fe packages needed)
# =============================================================================

name: Deploy Prod Vite MFE (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Module name e.g. crm, inventory, shell'
        required: true
        type: string
      nginx_root:
        description: 'Nginx document root e.g. /var/www/cdn.neonbee.app/html/crm'
        required: true
        type: string
      vite_env:
        description: 'Multiline VITE_* env vars for .env (built at compile time)'
        required: true
        type: string
      cf_purge_urls:
        description: 'Comma-separated URLs to purge, or "all" for purge_everything'
        required: false
        type: string
        default: ''
      needs_shell_packages:
        description: 'Checkout shell-fe and copy @so360/* packages (true for standard MFEs)'
        required: false
        type: boolean
        default: true
      is_shell:
        description: 'True for shell-fe only — builds packages internally'
        required: false
        type: boolean
        default: false
      node_version:
        required: false
        type: string
        default: '22'
    secrets:
      DIGITALOCEAN_SSH_KEY:          { required: true }
      PROD_SERVER_IP:                { required: true }
      PAT_TOKEN:                     { required: false }
      CF_SAAS_API_TOKEN:             { required: false }
      CF_SAAS_ZONE_ID:               { required: false }
      SUPABASE_URL:                  { required: false }
      SUPABASE_ANON_KEY:             { required: false }
      VITE_VAPID_PUBLIC_KEY:         { required: false }

jobs:

  gate:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests and security checks
        env:
          CI: 'true'
        run: |
          (npm audit --audit-level=critical --omit=dev) &
          AUDIT_PID=$!

          (npx --yes license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" --excludePrivatePackages) &
          LICENSE_PID=$!

          (GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi) &
          GITLEAKS_PID=$!

          npm test -- --passWithNoTests
          TEST_EXIT=$?

          wait $AUDIT_PID; AUDIT_EXIT=$?
          wait $LICENSE_PID; LICENSE_EXIT=$?
          wait $GITLEAKS_PID; GITLEAKS_EXIT=$?

          [ $AUDIT_EXIT -ne 0 ] && echo "::error::Security audit failed"
          [ $LICENSE_EXIT -ne 0 ] && echo "::error::License check failed"
          [ $GITLEAKS_EXIT -ne 0 ] && echo "::error::Secrets scan failed"
          [ $TEST_EXIT -ne 0 ] && echo "::error::Unit tests failed"

          exit $(( TEST_EXIT | AUDIT_EXIT | LICENSE_EXIT | GITLEAKS_EXIT ))

  build-deploy:
    needs: [gate]
    runs-on: self-hosted
    timeout-minutes: 20
    concurrency:
      group: neonbee-prod-deploy-${{ inputs.service_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout shell-fe packages
        if: inputs.needs_shell_packages && !inputs.is_shell
        uses: actions/checkout@v4
        with:
          repository: Neonbee-ai/so360-shell-fe
          token: ${{ secrets.PAT_TOKEN }}
          path: _shell-fe

      - name: Install and build (standard MFE)
        if: "!inputs.is_shell"
        run: |
          # Link shell-fe for @so360/* packages
          if [ -d "_shell-fe" ]; then
            RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
            rm -rf "$RUNNER_PARENT/so360-shell-fe"
            ln -s "$GITHUB_WORKSPACE/_shell-fe" "$RUNNER_PARENT/so360-shell-fe"
            (cd "$GITHUB_WORKSPACE/_shell-fe" && npm install --legacy-peer-deps 2>/dev/null || true)
          fi

          npm ci --legacy-peer-deps

          # Copy @so360/* packages from shell-fe
          if [ -d "_shell-fe" ]; then
            for pkg in shell-context design-system event-bus formatters; do
              rm -rf "node_modules/@so360/$pkg"
              cp -r "$GITHUB_WORKSPACE/_shell-fe/packages/$pkg" "node_modules/@so360/$pkg"
              (cd "node_modules/@so360/$pkg" && npm install --legacy-peer-deps 2>/dev/null || true)
            done
          fi

          # Write VITE env vars
          cat <<'VITE_EOF' > .env
          ${{ inputs.vite_env }}
          VITE_EOF
          sed -i 's/^[[:space:]]*//' .env

          npm run build

      - name: Install and build (shell-fe)
        if: inputs.is_shell
        run: |
          npm ci --legacy-peer-deps

          # Build shared packages
          cd packages/shell-context && npm run build && cd ../..
          cd packages/design-system && npm run build && cd ../..
          cd packages/event-bus && npm run build && cd ../..
          cd packages/formatters && npm run build && cd ../..

          # Write VITE env vars
          cat <<'VITE_EOF' > .env
          ${{ inputs.vite_env }}
          VITE_EOF
          sed -i 's/^[[:space:]]*//' .env

          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      - name: Deploy to Production
        env:
          SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          NGINX_ROOT: ${{ inputs.nginx_root }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Backup current dist
          ssh root@$SERVER_IP "
            mkdir -p '$NGINX_ROOT-prev' '$NGINX_ROOT'
            rsync -a --delete '$NGINX_ROOT/' '$NGINX_ROOT-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -t && nginx -s reload"
          echo "Deployed ${{ inputs.service_name }} to $NGINX_ROOT"

      - name: Purge Cloudflare cache
        if: inputs.cf_purge_urls != ''
        continue-on-error: true
        run: |
          CF_ZONE="${{ secrets.CF_SAAS_ZONE_ID }}"
          CF_TOKEN="${{ secrets.CF_SAAS_API_TOKEN }}"
          [ -z "$CF_ZONE" ] || [ -z "$CF_TOKEN" ] && echo "No CF credentials, skipping" && exit 0

          PURGE_URLS="${{ inputs.cf_purge_urls }}"
          if [ "$PURGE_URLS" = "all" ]; then
            BODY='{"purge_everything":true}'
          else
            # Convert comma-separated URLs to JSON array
            FILES=$(echo "$PURGE_URLS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd, -)
            BODY="{\"files\":[$FILES]}"
          fi

          RESP=$(curl -sX POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESP"
          echo "$RESP" | grep -q '"success":true' || { echo "CF purge failed (deploy still succeeded)"; exit 0; }
          echo "Cloudflare cache purged"

      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM || '' }}
          [ -z "$TOOLS" ] && exit 0
          ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null
          TS=$(date -u +%s)
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}-fe\",env=\"prod\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}-fe
            printf 'deploy_timestamp{service=\"${{ inputs.service_name }}-fe\",env=\"prod\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-fe
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "Service: ${{ inputs.service_name }} | Env: production | Status: ${{ job.status }}"
