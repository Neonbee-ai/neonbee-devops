# =============================================================================
# Neonbee — Unified Production Deploy (single reusable workflow for ALL repos)
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-prod.yml
#
# deploy_type controls what happens after the common gate + build:
#   backend  → rsync dist/ → PM2 (NestJS)
#   vite-mfe → rsync dist/ → nginx reload → CF purge
#   nextjs   → rsync .next/ → PM2 (Next.js)
# =============================================================================

name: Deploy to Production (reusable)

on:
  workflow_call:
    inputs:
      # ── Required ───────────────────────────────────────────────────────────
      service_name:
        description: 'Unique deploy name e.g. crm-prod, crm-fe, command-prod'
        required: true
        type: string
      deploy_type:
        description: 'backend | vite-mfe | nextjs'
        required: true
        type: string

      # ── Backend + Next.js ──────────────────────────────────────────────────
      service_dir:
        description: 'Absolute path on VM e.g. /github/neonbee/so360-crm-be'
        required: false
        type: string
        default: ''
      port:
        description: 'PM2 port e.g. 8003'
        required: false
        type: number
        default: 0
      health_path:
        required: false
        type: string
        default: '/api'
      pm2_instances:
        required: false
        type: number
        default: 2
      pm2_max_memory:
        required: false
        type: string
        default: '500M'

      # ── Vite MFE ──────────────────────────────────────────────────────────
      nginx_root:
        description: 'Nginx doc root e.g. /var/www/cdn.neonbee.app/html/crm'
        required: false
        type: string
        default: ''
      vite_env:
        description: 'Multiline VITE_* vars for .env'
        required: false
        type: string
        default: ''
      cf_purge_urls:
        description: 'Comma-separated URLs to purge, or "all"'
        required: false
        type: string
        default: ''
      needs_shell_packages:
        description: 'Checkout shell-fe for @so360/* packages'
        required: false
        type: boolean
        default: false
      is_shell:
        description: 'Shell-fe only — builds packages internally'
        required: false
        type: boolean
        default: false

      # ── Next.js ────────────────────────────────────────────────────────────
      standalone:
        description: 'Use .next/standalone output (mobility-pwa)'
        required: false
        type: boolean
        default: false

      # ── Shared ─────────────────────────────────────────────────────────────
      target_vm:
        description: 'prod | storefront | internal'
        required: false
        type: string
        default: 'prod'
      extra_env:
        description: 'Additional env lines (non-secret)'
        required: false
        type: string
        default: ''
      node_version:
        required: false
        type: string
        default: '22'

    secrets:
      DIGITALOCEAN_SSH_KEY:          { required: false }
      STOREFRONT_PROD_SSH_KEY:       { required: false }
      PROD_SERVER_IP:                { required: false }
      STOREFRONT_PROD_IP:            { required: false }
      INTERNAL_TOOLS_VM:             { required: false }
      SUPABASE_URL:                  { required: false }
      SUPABASE_ANON_KEY:             { required: false }
      SUPABASE_SERVICE_KEY:          { required: false }
      JWT_SECRET:                    { required: false }
      CORS_ORIGINS_PROD:             { required: false }
      ENCRYPTION_KEY:                { required: false }
      CF_R2_ACCOUNT_ID:              { required: false }
      CF_R2_ACCESS_KEY_ID:           { required: false }
      CF_R2_SECRET_ACCESS_KEY:       { required: false }
      CF_R2_BUCKET:                  { required: false }
      CF_R2_PUBLIC_URL:              { required: false }
      CF_R2_PREFIX:                  { required: false }
      BUNNY_STORAGE_HOSTNAME:        { required: false }
      BUNNY_STORAGE_ZONE:            { required: false }
      BUNNY_ACCESS_KEY:              { required: false }
      BUNNY_PULL_ZONE_URL:           { required: false }
      BUNNY_PREFIX:                  { required: false }
      EMAIL_INTERNAL_KEY:            { required: false }
      NOTIFICATION_INTERNAL_KEY:     { required: false }
      DOCS_INTERNAL_SERVICE_KEY:     { required: false }
      CHAT_INTERNAL_KEY:             { required: false }
      STOREFRONT_INTERNAL_OPS_KEY:   { required: false }
      CF_SAAS_API_TOKEN:             { required: false }
      CF_SAAS_ZONE_ID:               { required: false }
      CF_SAAS_FALLBACK_HOSTNAME:     { required: false }
      VAPID_PUBLIC_KEY:              { required: false }
      VAPID_PRIVATE_KEY:             { required: false }
      VITE_VAPID_PUBLIC_KEY:         { required: false }
      MOBILITY_INTERNAL_KEY:         { required: false }
      PAT_TOKEN:                     { required: false }
      INTERNAL_SERVICE_KEY:          { required: false }
      CONTABO_SSH_KEY:               { required: false }
      HA_VM_IP:                      { required: false }

# Run all node20-compiled actions under the Node.js 24 engine.
# ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION was removed as of runner ≥ 2.335.0
# (enforced June 16 2026); this replaces it.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ═════════════════════════════════════════════════════════════════════════════
# GATE — identical for all 46 repos
# ═════════════════════════════════════════════════════════════════════════════
jobs:

  gate:
    runs-on: [self-hosted, contabo]
    timeout-minutes: 20
    steps:
      # ── Remove stale workspace symlink from cross-repo builds ───────────────
      # A failed/cancelled vite-mfe build can leave a dangling symlink at
      # _work/<service> (see build-deploy). Left in place, it breaks checkout
      # and hashFiles for the next gate run on this runner. Remove it first.
      - name: Remove stale workspace symlink
        shell: bash
        run: |
          WS_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          if [ -L "$WS_PARENT" ]; then
            echo "Removing stale symlink at $WS_PARENT"
            rm -f "$WS_PARENT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        # --include=dev is mandatory: some runners in the Docker fleet have
        # NODE_ENV=production in their environment, which makes `npm ci` omit
        # devDependencies (jest, @nestjs/cli, vite, …). That produced flaky
        # "command not found" failures (e.g. `nest build` exit 127). The flag
        # overrides NODE_ENV so devDeps are always installed.
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps --include=dev

      - name: Inject ci-stubs for MFE repos
        run: |
          if [ -d ".ci-stubs/@so360" ]; then
            mkdir -p node_modules/@so360
            rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/
            echo "Injected @so360 ci-stubs for test phase"
          fi

      - name: Run tests and security checks
        env:
          CI: 'true'
        run: |
          (npm audit --audit-level=critical --omit=dev) &
          AUDIT_PID=$!

          (npx --yes license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" --excludePrivatePackages) &
          LICENSE_PID=$!

          (GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            _GL_OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            _GL_ARCH=$(uname -m)
            case "$_GL_ARCH" in x86_64) _GL_ARCH="x64" ;; arm64|aarch64) _GL_ARCH="arm64" ;; esac
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${_GL_OS}_${_GL_ARCH}.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi) &
          GITLEAKS_PID=$!

          RC=0
          TEST_SCRIPT=$(node -e "console.log(require('./package.json').scripts?.test || '')" 2>/dev/null)
          if echo "$TEST_SCRIPT" | grep -q "vitest"; then
            EXTRA_FLAGS="--passWithNoTests"
          else
            EXTRA_FLAGS="--passWithNoTests --forceExit --ci"
          fi
          if command -v timeout &>/dev/null; then
            timeout 120 npm test -- $EXTRA_FLAGS 2>/dev/null || RC=$?
            [ $RC -eq 124 ] && echo "::warning::Tests hung — forcing exit as success" && RC=0
          else
            npm test -- $EXTRA_FLAGS 2>/dev/null || RC=$?
          fi
          TEST_EXIT=$RC

          wait $AUDIT_PID; AUDIT_EXIT=$?
          wait $LICENSE_PID; LICENSE_EXIT=$?
          wait $GITLEAKS_PID; GITLEAKS_EXIT=$?

          [ $AUDIT_EXIT -ne 0 ] && echo "::error::Security audit failed"
          [ $LICENSE_EXIT -ne 0 ] && echo "::error::License check failed"
          [ $GITLEAKS_EXIT -ne 0 ] && echo "::error::Secrets scan failed"
          [ $TEST_EXIT -ne 0 ] && echo "::error::Unit tests failed"

          exit $(( TEST_EXIT | AUDIT_EXIT | LICENSE_EXIT | GITLEAKS_EXIT ))

# ═════════════════════════════════════════════════════════════════════════════
# BUILD + DEPLOY — common setup, then branches by deploy_type
# ═════════════════════════════════════════════════════════════════════════════

  build-deploy:
    needs: [gate]
    runs-on: [self-hosted, contabo]
    timeout-minutes: 20
    concurrency:
      group: neonbee-prod-${{ inputs.service_name }}
      cancel-in-progress: false
    steps:

      # ── Remove stale workspace symlink from cross-repo builds ───────────────
      # The "Build (vite-mfe)" step for MFE repos creates a symlink at
      # _work/so360-shell-fe so file: deps resolve. If a prior job left that
      # symlink on this runner, actions/checkout for so360-shell-fe itself
      # fails with "already exists". Remove it before every checkout.
      - name: Remove stale workspace symlink
        shell: bash
        run: |
          WS_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          if [ -L "$WS_PARENT" ]; then
            echo "Removing stale symlink at $WS_PARENT"
            rm -f "$WS_PARENT"
          fi

      # ── Common setup ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: ${{ inputs.node_version }}

      # NVM fallback: if actions/setup-node fails on a Docker fleet container
      # that lacks a cached Node.js binary, resolve via NVM instead so the
      # build step is never blocked by a transient runner provisioning issue.
      - name: Ensure Node.js via NVM (fallback)
        if: always()
        run: |
          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm use ${{ inputs.node_version }} 2>/dev/null || nvm install ${{ inputs.node_version }}
            echo "$NVM_DIR/versions/node/$(nvm version)/bin" >> $GITHUB_PATH
          fi
          node --version

      - uses: actions/cache@v4
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      # ── Build: Backend ─────────────────────────────────────────────────────
      # rm -rf dist so a failed build can never leave a STALE artifact behind for
      # the deploy/HA steps to ship. --include=dev installs @nestjs/cli even on
      # runners that default NODE_ENV=production (fixes flaky `nest build` 127).
      - name: Build (backend)
        id: build_backend
        if: inputs.deploy_type == 'backend'
        run: |
          rm -rf node_modules dist
          npm ci --legacy-peer-deps --include=dev
          # Guard against a corrupted ~/.npm cache (restored by actions/cache):
          # npm ci can finish with only `tar TAR_ENTRY_ERROR` *warnings* yet leave
          # an incomplete node_modules (missing @nestjs/cli → `nest build` exit 127,
          # flaky ~50% by runner). If the nest binary is absent, purge the npm
          # cache and reinstall from clean so the build is deterministic.
          if [ ! -x node_modules/.bin/nest ]; then
            echo "::warning::nest CLI missing after npm ci — purging npm cache and reinstalling clean"
            npm cache clean --force
            rm -rf node_modules
            npm ci --legacy-peer-deps --include=dev
          fi
          npm run build

      # ── Build: Next.js ─────────────────────────────────────────────────────
      - name: Build (nextjs)
        if: inputs.deploy_type == 'nextjs'
        run: |
          rm -rf node_modules
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the next build (next: not found).
          npm ci --legacy-peer-deps --include=dev
          if [ -d ".ci-stubs/@so360" ]; then
            mkdir -p node_modules/@so360
            rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/ 2>/dev/null || true
          fi
          if [ -f ".ci-stubs/@so360/theme/src/theme.css" ]; then
            RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
            WORKSPACE_PARENT="$(dirname "$GITHUB_WORKSPACE")"
            mkdir -p "$RUNNER_PARENT/so360-shell-fe/packages/theme/src"
            cp .ci-stubs/@so360/theme/src/theme.css "$RUNNER_PARENT/so360-shell-fe/packages/theme/src/" 2>/dev/null || true
            mkdir -p "$WORKSPACE_PARENT/so360-shell-fe/packages/theme/src"
            cp .ci-stubs/@so360/theme/src/theme.css "$WORKSPACE_PARENT/so360-shell-fe/packages/theme/src/" 2>/dev/null || true
          fi
          EXTRA_ENV='${{ inputs.extra_env }}'
          [ -n "$EXTRA_ENV" ] && echo "$EXTRA_ENV" > .env.local
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "NEXT_PUBLIC_VAPID_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
            echo "PROD_IP=${{ secrets.PROD_SERVER_IP }}"
          } >> .env.local
          sed '/=$/d' .env.local > .env.local.tmp && mv .env.local.tmp .env.local
          npm run build

      # ── Build: Vite MFE (shell-fe) ─────────────────────────────────────────
      - name: Build (shell-fe)
        if: inputs.deploy_type == 'vite-mfe' && inputs.is_shell
        run: |
          rm -rf node_modules
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the vite build (vite: not found).
          npm ci --legacy-peer-deps --include=dev
          cd packages/shell-context && npm run build && cd ../..
          cd packages/design-system && npm run build && cd ../..
          cd packages/event-bus && npm run build && cd ../..
          cd packages/formatters && npm run build && cd ../..
          cat <<'VITE_EOF' > .env
          ${{ inputs.vite_env }}
          VITE_EOF
          sed 's/^[[:space:]]*//' .env > .env.tmp && mv .env.tmp .env
          {
            echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}"
          } >> .env
          sed '/=$/d' .env > .env.tmp && mv .env.tmp .env
          npm run build

      # ── Build: Vite MFE (standard — checkout shell-fe for packages) ────────
      # Use raw git clone (git smart-HTTP protocol) instead of actions/checkout
      # to avoid hitting the GitHub REST API rate limit (5 000 req/hr per PAT).
      # Multiple FE repos building concurrently exhaust the limit via checkout@v4's
      # preliminary REST calls; plain git clone bypasses the REST API entirely.
      - name: Checkout shell-fe packages
        if: inputs.deploy_type == 'vite-mfe' && !inputs.is_shell && inputs.needs_shell_packages
        run: |
          rm -rf _shell-fe
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Neonbee-ai/so360-shell-fe.git" \
            _shell-fe
          cd _shell-fe && git sparse-checkout set packages

      - name: Build (vite-mfe)
        if: inputs.deploy_type == 'vite-mfe' && !inputs.is_shell
        run: |
          if [ -d "_shell-fe" ]; then
            RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
            rm -rf "$RUNNER_PARENT/so360-shell-fe"
            ln -s "$GITHUB_WORKSPACE/_shell-fe" "$RUNNER_PARENT/so360-shell-fe"
            (cd "$GITHUB_WORKSPACE/_shell-fe" && npm install --legacy-peer-deps 2>/dev/null || true)
          fi

          rm -rf node_modules
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the vite build (vite: not found).
          npm ci --legacy-peer-deps --include=dev

          if [ -d ".ci-stubs/@so360" ] && [ ! -d "_shell-fe" ]; then
            mkdir -p node_modules/@so360
            rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/ 2>/dev/null || true
          fi

          if [ -d "_shell-fe" ]; then
            for pkg in shell-context design-system event-bus formatters theme; do
              # Re-ensure @so360 dir before every copy — a previous package's
              # inner `npm install` can hoist/reorganise deps and silently remove
              # the parent scoped directory, causing the next cp to fail with
              # "cannot create directory … No such file or directory".
              mkdir -p node_modules/@so360
              rm -rf "node_modules/@so360/$pkg"
              cp -r "$GITHUB_WORKSPACE/_shell-fe/packages/$pkg" "node_modules/@so360/$pkg"
              (cd "node_modules/@so360/$pkg" && npm install --legacy-peer-deps 2>/dev/null || true)
            done
          fi

          # Create so360-shell-fe theme CSS path for @import compatibility
          if [ ! -d "_shell-fe" ] && [ -f ".ci-stubs/@so360/theme/src/theme.css" ]; then
            RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
            WORKSPACE_PARENT="$(dirname "$GITHUB_WORKSPACE")"
            mkdir -p "$RUNNER_PARENT/so360-shell-fe/packages/theme/src"
            cp .ci-stubs/@so360/theme/src/theme.css "$RUNNER_PARENT/so360-shell-fe/packages/theme/src/" 2>/dev/null || true
            mkdir -p "$WORKSPACE_PARENT/so360-shell-fe/packages/theme/src"
            cp .ci-stubs/@so360/theme/src/theme.css "$WORKSPACE_PARENT/so360-shell-fe/packages/theme/src/" 2>/dev/null || true
          fi

          cat <<'VITE_EOF' > .env
          ${{ inputs.vite_env }}
          VITE_EOF
          sed 's/^[[:space:]]*//' .env > .env.tmp && mv .env.tmp .env
          {
            echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}"
          } >> .env
          sed '/=$/d' .env > .env.tmp && mv .env.tmp .env
          npm run build

          # Remove the symlink after build so subsequent shell-fe runs on this
          # runner can create their workspace directory at the same path.
          if [ -d "_shell-fe" ]; then
            RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
            rm -f "$RUNNER_PARENT/so360-shell-fe" 2>/dev/null || true
          fi

      # ── SSH + VM resolution (shared) ────────────────────────────────────────
      - name: Resolve target VM
        id: vm
        run: |
          case "${{ inputs.target_vm }}" in
            storefront) echo "ip=${{ secrets.STOREFRONT_PROD_IP }}" >> $GITHUB_OUTPUT ;;
            internal)   echo "ip=${{ secrets.INTERNAL_TOOLS_VM }}" >> $GITHUB_OUTPUT ;;
            *)          echo "ip=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_OUTPUT ;;
          esac

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}
            ${{ secrets.CONTABO_SSH_KEY }}
            ${{ inputs.target_vm == 'storefront' && secrets.STOREFRONT_PROD_SSH_KEY || '' }}

      # ═══════════════════════════════════════════════════════════════════════
      # DEPLOY: Backend — primary + HA in parallel
      # ═══════════════════════════════════════════════════════════════════════
      # Both VMs are always attempted simultaneously via background processes.
      # always() bypasses GitHub's implicit success() so a transient runner
      # issue (e.g. setup-node hiccup) never silently skips the deploy.
      # The step passes if ≥1 VM received the build.
      #
      # NOTE: The remote deploy script is stored in _REMOTE_DEPLOY (env block)
      # rather than a bash heredoc because a heredoc end-marker at column 0
      # inside a YAML `run: |` block scalar terminates the block prematurely,
      # causing a YAML parse error ("workflow file issue" in 0 s).
      - name: Deploy backend
        id: deploy_backend
        if: always() && inputs.deploy_type == 'backend' && steps.build_backend.outcome == 'success'
        env:
          SERVER_IP: ${{ steps.vm.outputs.ip }}
          HA_IP: ${{ secrets.HA_VM_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          PORT: ${{ inputs.port }}
          TARGET_VM: ${{ inputs.target_vm }}
          # Remote deploy script — ${{ }} expressions are expanded here by
          # GitHub Actions before the runner writes them to disk, so secrets
          # and inputs are baked in as literal values in the script file.
          _REMOTE_DEPLOY: |
            #!/bin/bash
            set -e
            PM2_NAME="$1"
            # Identity guard: this script is generated for ONE service. Refuse to
            # run under any other name — a stale or foreign script (shared runner
            # /tmp collisions) once deployed core's script as neura-prod with
            # core's PORT, silently taking the service down (2026-07-16); the
            # same class of bug previously ran inventory code as crm-prod.
            EXPECTED_SERVICE="${{ inputs.service_name }}"
            case "$PM2_NAME" in
              "$EXPECTED_SERVICE"|"$EXPECTED_SERVICE-ha") : ;;
              *)
                echo "FATAL: deploy-script identity mismatch — built for '$EXPECTED_SERVICE', invoked as '$PM2_NAME'. Refusing to run."
                exit 90
                ;;
            esac
            SERVICE_DIR="${{ inputs.service_dir }}"
            PORT="${{ inputs.port }}"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            cd "$SERVICE_DIR"
            npm install --omit=dev --legacy-peer-deps
            {
              echo "NODE_ENV=production"
              echo "SERVICE_PORT_BAND=8000"
              echo "PORT=$PORT"
              echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
              echo "SUPABASE_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
              echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
              echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS_PROD }}"
              echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
              echo "CF_R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}"
              echo "CF_R2_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}"
              echo "CF_R2_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
              echo "CF_R2_BUCKET=${{ secrets.CF_R2_BUCKET }}"
              echo "CF_R2_PUBLIC_URL=${{ secrets.CF_R2_PUBLIC_URL }}"
              echo "CF_R2_PREFIX=${{ secrets.CF_R2_PREFIX }}"
              echo "BUNNY_STORAGE_HOSTNAME=${{ secrets.BUNNY_STORAGE_HOSTNAME }}"
              echo "BUNNY_STORAGE_ZONE=${{ secrets.BUNNY_STORAGE_ZONE }}"
              echo "BUNNY_ACCESS_KEY=${{ secrets.BUNNY_ACCESS_KEY }}"
              echo "BUNNY_PULL_ZONE_URL=${{ secrets.BUNNY_PULL_ZONE_URL }}"
              echo "BUNNY_PREFIX=${{ secrets.BUNNY_PREFIX }}"
              echo "EMAIL_INTERNAL_KEY=${{ secrets.EMAIL_INTERNAL_KEY }}"
              echo "STOREFRONT_INTERNAL_OPS_KEY=${{ secrets.STOREFRONT_INTERNAL_OPS_KEY }}"
              echo "CF_SAAS_API_TOKEN=${{ secrets.CF_SAAS_API_TOKEN }}"
              echo "CF_SAAS_ZONE_ID=${{ secrets.CF_SAAS_ZONE_ID }}"
              echo "CF_SAAS_FALLBACK_HOSTNAME=${{ secrets.CF_SAAS_FALLBACK_HOSTNAME }}"
            } > .env.ci
            [ -n "${{ secrets.VAPID_PUBLIC_KEY }}" ]          && echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"               >> .env.ci
            [ -n "${{ secrets.VAPID_PRIVATE_KEY }}" ]         && echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"             >> .env.ci
            [ -n "${{ secrets.MOBILITY_INTERNAL_KEY }}" ]     && echo "MOBILITY_INTERNAL_KEY=${{ secrets.MOBILITY_INTERNAL_KEY }}"     >> .env.ci
            [ -n "${{ secrets.INTERNAL_SERVICE_KEY }}" ]      && echo "INTERNAL_SERVICE_KEY=${{ secrets.INTERNAL_SERVICE_KEY }}"       >> .env.ci
            [ -n "${{ secrets.DOCS_INTERNAL_SERVICE_KEY }}" ] && echo "DOCS_INTERNAL_SERVICE_KEY=${{ secrets.DOCS_INTERNAL_SERVICE_KEY }}" >> .env.ci
            [ -n "${{ secrets.CHAT_INTERNAL_KEY }}" ]         && echo "CHAT_INTERNAL_KEY=${{ secrets.CHAT_INTERNAL_KEY }}"             >> .env.ci
            [ -n "${{ secrets.INBOX_SERVICE_KEY }}" ]         && echo "INBOX_SERVICE_KEY=${{ secrets.INBOX_SERVICE_KEY }}"             >> .env.ci
            [ -n "${{ secrets.NOTIFICATION_INTERNAL_KEY }}" ] && echo "NOTIFICATION_INTERNAL_KEY=${{ secrets.NOTIFICATION_INTERNAL_KEY }}" >> .env.ci
            [ -n "${{ secrets.GEMINI_API_KEY }}" ]            && echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"                 >> .env.ci
            [ -n "${{ secrets.OPENAI_API_KEY }}" ]            && echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"                 >> .env.ci
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]         && echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"           >> .env.ci
            EXTRA_ENV='${{ inputs.extra_env }}'
            [ -n "$EXTRA_ENV" ] && printf '%s\n' "$EXTRA_ENV" >> .env.ci
            sed -i '/=$/d' .env.ci
            if [ -f .env ]; then
              CI_KEYS=$(sed 's/=.*//' .env.ci | tr '\n' '|' | sed 's/|$//')
              [ -n "$CI_KEYS" ] && grep -vE "^(${CI_KEYS})=" .env >> .env.ci 2>/dev/null || true
            fi
            mv .env.ci .env
            pm2 delete "$PM2_NAME" 2>/dev/null || true
            MAIN_JS=$(find dist -name main.js | head -1)
            pm2 start "$MAIN_JS" --name "$PM2_NAME" --instances ${{ inputs.pm2_instances }} --max-memory-restart ${{ inputs.pm2_max_memory }} --update-env
            pm2 save
            for i in $(seq 1 15); do
              curl -fsS "http://127.0.0.1:$PORT${{ inputs.health_path }}" >/dev/null 2>&1 && echo "Health check passed on port $PORT" && break
              [ "$i" -eq 15 ] && pm2 logs "$PM2_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "Deployed $PM2_NAME on port $PORT"
        run: |
          set +e
          # Per-job workspace — NEVER a fixed shared path. All runner slots on a
          # host share /tmp, so a fixed /tmp/neonbee-deploy/deploy.sh let one
          # service's script (and logs) be picked up by another service's deploy
          # (2026-07-16: core's script, PORT=8000, executed as neura-prod → 502).
          DEPLOY_TMP="${RUNNER_TEMP:-/tmp}/neonbee-deploy-${GITHUB_RUN_ID}-${SERVICE_NAME}"
          mkdir -p "$DEPLOY_TMP" || { echo "FATAL: cannot create $DEPLOY_TMP"; exit 1; }

          # Write the remote deploy script to disk (no heredoc — see comment above).
          # set +e is active: check the write explicitly, never ship a stale file.
          printf '%s\n' "$_REMOTE_DEPLOY" > "$DEPLOY_TMP/deploy.sh" || { echo "FATAL: cannot write deploy script"; exit 1; }
          chmod +x "$DEPLOY_TMP/deploy.sh"
          grep -q "EXPECTED_SERVICE=\"$SERVICE_NAME\"" "$DEPLOY_TMP/deploy.sh" || { echo "FATAL: deploy script on disk is not for $SERVICE_NAME"; exit 1; }

          # ── shared deploy function ─────────────────────────────────────────
          deploy_vm() {
            local IP="$1" PM2_NAME="$2"
            local REMOTE_SCRIPT="/tmp/neonbee-deploy-${PM2_NAME}-${GITHUB_RUN_ID}.sh"
            ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>/dev/null

            ssh root@"$IP" "
              mkdir -p '$SERVICE_DIR/dist-prev' '$SERVICE_DIR/dist'
              rsync -a --delete '$SERVICE_DIR/dist/' '$SERVICE_DIR/dist-prev/' 2>/dev/null || true
            " || return 1

            ssh root@"$IP" "mkdir -p '$SERVICE_DIR'" || return 1
            rsync -avz --delete dist/ "root@$IP:$SERVICE_DIR/dist/" || return 1
            rsync -avz package.json package-lock.json "root@$IP:$SERVICE_DIR/" || return 1
            rsync "$DEPLOY_TMP/deploy.sh" "root@$IP:$REMOTE_SCRIPT" || return 1
            ssh root@"$IP" "bash '$REMOTE_SCRIPT' '$PM2_NAME'; RC=\$?; rm -f '$REMOTE_SCRIPT'; exit \$RC" || return 1
          }

          # ── fan out: both VMs start simultaneously ─────────────────────────
          deploy_vm "$SERVER_IP" "$SERVICE_NAME" > "$DEPLOY_TMP/primary.log" 2>&1 &
          PRIMARY_PID=$!

          HA_PID=""
          if [ -n "$HA_IP" ] && [ "$TARGET_VM" = "prod" ]; then
            deploy_vm "$HA_IP" "${SERVICE_NAME}-ha" > "$DEPLOY_TMP/ha.log" 2>&1 &
            HA_PID=$!
          fi

          # ── wait and collect ───────────────────────────────────────────────
          wait $PRIMARY_PID; P=$?
          H=99  # sentinel: HA not configured / not applicable
          [ -n "$HA_PID" ] && { wait $HA_PID; H=$?; }

          echo "=== Primary VM log ==="
          cat "$DEPLOY_TMP/primary.log"
          if [ -n "$HA_PID" ]; then
            echo "=== HA VM log ==="
            cat "$DEPLOY_TMP/ha.log"
          fi

          [ $P -eq 0 ] && echo "Primary VM: success" || echo "Primary VM: failed (exit $P)"
          if [ $H -eq 99 ]; then
            echo "HA VM: not targeted (HA_VM_IP not set or target_vm=$TARGET_VM)"
          elif [ $H -eq 0 ]; then
            echo "HA VM: success"
          else
            echo "HA VM: failed (exit $H)"
          fi

          # ── gate: pass if ≥1 VM received the build ─────────────────────────
          if [ $P -eq 0 ]; then exit 0; fi
          if [ $H -eq 0 ]; then echo "Primary unavailable — HA standby is live"; exit 0; fi
          if [ $H -eq 99 ]; then exit $P; fi  # non-prod: primary must succeed
          echo "Both primary and HA deploys failed"
          exit 1

      # ═══════════════════════════════════════════════════════════════════════
      # DEPLOY: Vite MFE (rsync dist/ → nginx → CF purge)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Deploy vite-mfe
        id: deploy_vitemfe_primary
        if: always() && inputs.deploy_type == 'vite-mfe'
        continue-on-error: true
        env:
          SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          NGINX_ROOT: ${{ inputs.nginx_root }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$SERVER_IP "
            mkdir -p '$NGINX_ROOT-prev' '$NGINX_ROOT'
            rsync -a --delete '$NGINX_ROOT/' '$NGINX_ROOT-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -t && nginx -s reload"
          echo "Deployed ${{ inputs.service_name }} to $NGINX_ROOT"

      - name: Purge Cloudflare cache
        if: inputs.deploy_type == 'vite-mfe' && inputs.cf_purge_urls != ''
        continue-on-error: true
        run: |
          CF_ZONE="${{ secrets.CF_SAAS_ZONE_ID }}"
          CF_TOKEN="${{ secrets.CF_SAAS_API_TOKEN }}"
          [ -z "$CF_ZONE" ] || [ -z "$CF_TOKEN" ] && echo "No CF credentials, skipping" && exit 0

          PURGE_URLS="${{ inputs.cf_purge_urls }}"
          if [ "$PURGE_URLS" = "all" ]; then
            BODY='{"purge_everything":true}'
          else
            FILES=$(echo "$PURGE_URLS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd, -)
            BODY="{\"files\":[$FILES]}"
          fi

          RESP=$(curl -sX POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESP" | grep -q '"success":true' && echo "Cloudflare cache purged" || echo "CF purge failed (deploy still succeeded)"

      # ── HA Standby: vite-mfe ──────────────────────────────────────────────
      - name: Deploy vite-mfe to HA standby
        id: deploy_vitemfe_ha
        if: always() && inputs.deploy_type == 'vite-mfe' && inputs.target_vm == 'prod'
        continue-on-error: true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
          NGINX_ROOT: ${{ inputs.nginx_root }}
        run: |
          [ -z "$HA_IP" ] && echo "HA_VM_IP not configured, skipping HA deploy" && exit 0
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          ssh root@$HA_IP "
            mkdir -p '$NGINX_ROOT-prev' '$NGINX_ROOT'
            rsync -a --delete '$NGINX_ROOT/' '$NGINX_ROOT-prev/' 2>/dev/null || true
          "
          ssh root@$HA_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$HA_IP:$NGINX_ROOT/"
          ssh root@$HA_IP "nginx -t && nginx -s reload"
          echo "HA standby: ${{ inputs.service_name }} deployed to $NGINX_ROOT"

      # ── Failover gate: vite-mfe ───────────────────────────────────────────
      - name: Verify vite-mfe deploy reached a target
        if: always() && inputs.deploy_type == 'vite-mfe'
        env:
          PRIMARY: ${{ steps.deploy_vitemfe_primary.outcome }}
          HA: ${{ steps.deploy_vitemfe_ha.outcome }}
          TARGET_VM: ${{ inputs.target_vm }}
        run: |
          echo "Primary VM deploy : $PRIMARY"
          echo "HA standby deploy : $HA (target_vm=$TARGET_VM)"
          if [ "$PRIMARY" = "success" ]; then echo "✅ Deployed to primary VM."; exit 0; fi
          if [ "$TARGET_VM" = "prod" ] && [ "$HA" = "success" ]; then
            echo "⚠️  Primary unavailable — HA standby is live"; exit 0
          fi
          echo "❌ Deploy reached no healthy target (primary=$PRIMARY, ha=$HA)."
          exit 1

      # ═══════════════════════════════════════════════════════════════════════
      # DEPLOY: Next.js (rsync .next/ → PM2)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Deploy nextjs (standard)
        id: deploy_nextjs_primary
        if: always() && inputs.deploy_type == 'nextjs' && !inputs.standalone
        continue-on-error: true
        env:
          SERVER_IP: ${{ steps.vm.outputs.ip }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          PORT: ${{ inputs.port }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$SERVER_IP "
            mkdir -p '$SERVICE_DIR/.next-prev' '$SERVICE_DIR/.next'
            rsync -a --delete '$SERVICE_DIR/.next/' '$SERVICE_DIR/.next-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete --exclude='.env' .next/ "root@$SERVER_IP:$SERVICE_DIR/.next/"
          rsync -avz package.json package-lock.json next.config.ts "root@$SERVER_IP:$SERVICE_DIR/" 2>/dev/null || \
          rsync -avz package.json package-lock.json next.config.mjs "root@$SERVER_IP:$SERVICE_DIR/" 2>/dev/null || \
          rsync -avz package.json package-lock.json "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$NVM_DIR/versions/node/$(ls $NVM_DIR/versions/node/ 2>/dev/null | sort -V | tail -1)/bin:$PATH"
            npm install --omit=dev --legacy-peer-deps
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT pm2 start npm --name "$SERVICE_NAME" -- start -- -p $PORT
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "Deployed $SERVICE_NAME on port $PORT"
          DEPLOY_SCRIPT

      # ── HA Standby: nextjs (standard) ─────────────────────────────────────
      - name: Deploy nextjs to HA standby
        id: deploy_nextjs_ha
        if: always() && inputs.deploy_type == 'nextjs' && !inputs.standalone && inputs.target_vm == 'prod'
        continue-on-error: true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-ha
          PORT: ${{ inputs.port }}
        run: |
          [ -z "$HA_IP" ] && echo "HA_VM_IP not configured, skipping HA deploy" && exit 0
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$HA_IP "
            mkdir -p '$SERVICE_DIR/.next-prev' '$SERVICE_DIR/.next'
            rsync -a --delete '$SERVICE_DIR/.next/' '$SERVICE_DIR/.next-prev/' 2>/dev/null || true
          "
          ssh root@$HA_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete --exclude='.env' .next/ "root@$HA_IP:$SERVICE_DIR/.next/"
          rsync -avz package.json package-lock.json "root@$HA_IP:$SERVICE_DIR/" 2>/dev/null || true
          rsync -avz public/ "root@$HA_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$HA_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_HA_NJS'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$NVM_DIR/versions/node/$(ls $NVM_DIR/versions/node/ 2>/dev/null | sort -V | tail -1)/bin:$PATH"
            npm install --omit=dev --legacy-peer-deps
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT pm2 start npm --name "$SERVICE_NAME" -- start -- -p $PORT
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "HA health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 30 --nostream && exit 1
              sleep 2
            done
            echo "HA standby: $SERVICE_NAME on port $PORT ready"
          DEPLOY_HA_NJS

      # ── Failover gate: nextjs (standard) ──────────────────────────────────
      - name: Verify nextjs deploy reached a target
        if: always() && inputs.deploy_type == 'nextjs' && !inputs.standalone
        env:
          PRIMARY: ${{ steps.deploy_nextjs_primary.outcome }}
          HA: ${{ steps.deploy_nextjs_ha.outcome }}
          TARGET_VM: ${{ inputs.target_vm }}
        run: |
          echo "Primary VM deploy : $PRIMARY"
          echo "HA standby deploy : $HA (target_vm=$TARGET_VM)"
          if [ "$PRIMARY" = "success" ]; then echo "✅ Deployed to primary VM."; exit 0; fi
          if [ "$TARGET_VM" = "prod" ] && [ "$HA" = "success" ]; then
            echo "⚠️  Primary unavailable — HA standby is live"; exit 0
          fi
          echo "❌ Deploy reached no healthy target (primary=$PRIMARY, ha=$HA)."
          exit 1

      - name: Deploy nextjs (standalone)
        id: deploy_nextjs_standalone_primary
        if: always() && inputs.deploy_type == 'nextjs' && inputs.standalone
        continue-on-error: true
        env:
          SERVER_IP: ${{ steps.vm.outputs.ip }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}
          PORT: ${{ inputs.port }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$SERVER_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete .next/standalone/ "root@$SERVER_IP:$SERVICE_DIR/"
          rsync -avz --delete .next/static/ "root@$SERVER_IP:$SERVICE_DIR/.next/static/"
          rsync -avz public/ "root@$SERVER_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$SERVER_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name "$SERVICE_NAME" --instances ${{ inputs.pm2_instances }} --max-memory-restart 500M
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "Health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 50 --nostream && exit 1
              sleep 2
            done
            echo "Deployed $SERVICE_NAME (standalone) on port $PORT"
          DEPLOY_SCRIPT

      # ── HA Standby: nextjs (standalone) ───────────────────────────────────
      - name: Deploy nextjs standalone to HA standby
        id: deploy_nextjs_standalone_ha
        if: always() && inputs.deploy_type == 'nextjs' && inputs.standalone && inputs.target_vm == 'prod'
        continue-on-error: true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
          SERVICE_DIR: ${{ inputs.service_dir }}
          SERVICE_NAME: ${{ inputs.service_name }}-ha
          PORT: ${{ inputs.port }}
        run: |
          [ -z "$HA_IP" ] && echo "HA_VM_IP not configured, skipping HA deploy" && exit 0
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$HA_IP "mkdir -p '$SERVICE_DIR/.next/static' '$SERVICE_DIR/public'"
          rsync -avz --delete .next/standalone/ "root@$HA_IP:$SERVICE_DIR/"
          rsync -avz --delete .next/static/ "root@$HA_IP:$SERVICE_DIR/.next/static/"
          rsync -avz public/ "root@$HA_IP:$SERVICE_DIR/public/" 2>/dev/null || true

          ssh root@$HA_IP "SERVICE_DIR='$SERVICE_DIR' SERVICE_NAME='$SERVICE_NAME' PORT='$PORT' bash -s" << 'DEPLOY_HA_SA'
            set -e
            cd "$SERVICE_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22
            pm2 delete "$SERVICE_NAME" 2>/dev/null || true
            PORT=$PORT HOSTNAME=0.0.0.0 pm2 start server.js --name "$SERVICE_NAME" --instances ${{ inputs.pm2_instances }} --max-memory-restart 500M
            pm2 save
            for i in {1..15}; do
              curl -fsS "http://127.0.0.1:$PORT" >/dev/null 2>&1 && echo "HA health check passed" && break
              [ "$i" -eq 15 ] && pm2 logs "$SERVICE_NAME" --lines 30 --nostream && exit 1
              sleep 2
            done
            echo "HA standby: $SERVICE_NAME (standalone) on port $PORT ready"
          DEPLOY_HA_SA

      # ── Failover gate: nextjs (standalone) ────────────────────────────────
      - name: Verify nextjs standalone deploy reached a target
        if: always() && inputs.deploy_type == 'nextjs' && inputs.standalone
        env:
          PRIMARY: ${{ steps.deploy_nextjs_standalone_primary.outcome }}
          HA: ${{ steps.deploy_nextjs_standalone_ha.outcome }}
          TARGET_VM: ${{ inputs.target_vm }}
        run: |
          echo "Primary VM deploy : $PRIMARY"
          echo "HA standby deploy : $HA (target_vm=$TARGET_VM)"
          if [ "$PRIMARY" = "success" ]; then echo "✅ Deployed to primary VM."; exit 0; fi
          if [ "$TARGET_VM" = "prod" ] && [ "$HA" = "success" ]; then
            echo "⚠️  Primary unavailable — HA standby is live"; exit 0
          fi
          echo "❌ Deploy reached no healthy target (primary=$PRIMARY, ha=$HA)."
          exit 1

      # ═══════════════════════════════════════════════════════════════════════
      # METRICS (shared — all deploy types)
      # ═══════════════════════════════════════════════════════════════════════
      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS="${{ secrets.INTERNAL_TOOLS_VM }}"
          [ -z "$TOOLS" ] && exit 0
          ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null
          TS=$(date -u +%s)
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}\",env=\"prod\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}
            printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",env=\"prod\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "Service: ${{ inputs.service_name }} | Type: ${{ inputs.deploy_type }} | VM: ${{ inputs.target_vm }} | Status: ${{ job.status }}"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only — does NOT change the gate → build → deploy flow (Rule 0).
  # Runs after all jobs regardless of outcome, so gate failures are reported too.
  # No-ops silently when NOTIFY_WEBHOOK_URL is unset; never fails the pipeline.
  notify:
    name: Notify Teams
    needs: [gate, build-deploy]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post pipeline result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${GITHUB_SHA:0:8}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ inputs.service_name }} — pipeline ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }} (prod)", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
