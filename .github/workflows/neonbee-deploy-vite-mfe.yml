# =============================================================================
# Neonbee — Reusable Vite MFE Frontend Deploy Workflow
# =============================================================================
# Place in: neonbee-devops/.github/workflows/neonbee-deploy-vite-mfe.yml
#
# Architecture (CLAUDE.md Rule 0 — NON-NEGOTIABLE):
#   Contabo runner: gate → build → rsync dist/
#   Target VM    : receives static dist/ only → nginx -s reload (no build on VM)
#
# Blue/Green additions (layered on top of live base pattern):
#   - NGINX_ROOT-prev backup before overwrite (enables 30-sec rollback)
#   - Pushgateway metric pushed via SSH to Internal Tools VM
# =============================================================================

name: Deploy Vite MFE (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      nginx_root_dev:
        required: true
        type: string
      nginx_root_staging:
        required: true
        type: string
      vite_base_url_dev:
        required: true
        type: string
      vite_base_url_staging:
        required: true
        type: string
      vite_core_api_dev:
        required: false
        type: string
        default: 'https://dev.api.skyoffice360.com/core'
      vite_core_api_staging:
        required: false
        type: string
        default: 'https://staging.api.skyoffice360.com/core'
      is_mfe:
        required: false
        type: boolean
        default: true
      node_version:
        required: false
        type: string
        default: '22'
    secrets:
      CONTABO_SSH_KEY:      { required: true }
      DIGITALOCEAN_SSH_KEY: { required: true }
      SERVER_IP:            { required: true }
      INTERNAL_TOOLS_VM:    { required: false }
      PAT_TOKEN:            { required: false }

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ── Gate: single merged job ────────────────────────────────────────────────
  gate:
    runs-on: [self-hosted, contabo]
    steps:
      - uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/cache@v4.3.0
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Inject ci-stubs for MFE repos
        run: |
          if [ -d ".ci-stubs/@so360" ]; then
            mkdir -p node_modules/@so360
            rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/
            echo "Injected @so360 ci-stubs for test phase"
          fi
      - name: Run unit tests
        env:
          CI: 'true'
        run: npm test
      - name: Lint
        run: npm run lint --if-present
      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev
      - name: Check dependency licenses
        run: >-
          npx license-checker
          --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"
          --excludePrivatePackages
      - name: Scan for secrets
        run: |
          rm -rf dist/ coverage/ dist-ssr/
          GITLEAKS_VERSION="8.30.1"
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source . --verbose
          else
            _GL_OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            _GL_ARCH=$(uname -m)
            case "$_GL_ARCH" in x86_64) _GL_ARCH="x64" ;; arm64|aarch64) _GL_ARCH="arm64" ;; esac
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${_GL_OS}_${_GL_ARCH}.tar.gz" | tar -xz -C /tmp/
            /tmp/gitleaks detect --source . --verbose
          fi

  # ── Build + Deploy (gate must pass) ───────────────────────────────────────
  build-deploy:
    needs: [gate]
    runs-on: [self-hosted, contabo]
    timeout-minutes: 20
    concurrency:
      group: neonbee-deploy-${{ inputs.service_name }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/cache@v4.3.0
        if: runner.os == 'Linux'
        with:
          path: ~/.npm
          key: npm-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-${{ runner.os }}-

      - name: Record build start
        id: timing
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.CONTABO_SSH_KEY }}
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      # Build on Contabo runner — dist/ generated here, never on target VM
      - name: Install + build (dev)
        if: github.ref == 'refs/heads/main'
        run: |
          # Remove stale so360-shell-fe symlink from previous prod deploys so
          # vite.config.ts aliases fall back to node_modules/@so360/ stubs.
          # Guard: never remove a path that CONTAINS the live checkout. The
          # runner layout is _work/<repo>/<repo>, so for the shell-fe repo the
          # candidate path (_work/so360-shell-fe) is the PARENT of $GITHUB_WORKSPACE
          # — removing it deletes the cwd (uv_cwd ENOENT on the next npm command).
          RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
          STALE_PKG="$RUNNER_PARENT/so360-shell-fe"
          case "$GITHUB_WORKSPACE/" in
            "$STALE_PKG"/*) echo "Skipping stale-pkg removal: $STALE_PKG contains the live checkout" ;;
            *) rm -rf "$STALE_PKG" 2>/dev/null || true ;;
          esac
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the vite build (vite: not found).
          npm ci --legacy-peer-deps --include=dev
          mkdir -p node_modules/@so360
          rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/ 2>/dev/null || true
          printf '%s\n' \
            "VITE_BASE_URL=${{ inputs.vite_base_url_dev }}" \
            "VITE_SO360_CORE_API=${{ inputs.vite_core_api_dev }}" \
            "VITE_ENVIRONMENT=cloud" \
            > .env
          npm run build

      - name: Install + build (staging)
        if: github.ref == 'refs/heads/qa'
        run: |
          # Guard: never remove a path that contains the live checkout (see dev step).
          RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
          STALE_PKG="$RUNNER_PARENT/so360-shell-fe"
          case "$GITHUB_WORKSPACE/" in
            "$STALE_PKG"/*) echo "Skipping stale-pkg removal: $STALE_PKG contains the live checkout" ;;
            *) rm -rf "$STALE_PKG" 2>/dev/null || true ;;
          esac
          # --include=dev: Docker-fleet runners may set NODE_ENV=production, which
          # makes `npm ci` omit devDeps and breaks the vite build (vite: not found).
          npm ci --legacy-peer-deps --include=dev
          mkdir -p node_modules/@so360
          rm -rf node_modules/@so360/* && cp -r .ci-stubs/@so360/* node_modules/@so360/ 2>/dev/null || true
          printf '%s\n' \
            "VITE_BASE_URL=${{ inputs.vite_base_url_staging }}" \
            "VITE_SO360_CORE_API=${{ inputs.vite_core_api_staging }}" \
            "VITE_ENVIRONMENT=cloud" \
            > .env
          npm run build

      # ── Dev ──────────────────────────────────────────────────────────────
      - name: Deploy to Dev
        if: github.ref == 'refs/heads/main'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          NGINX_ROOT: ${{ inputs.nginx_root_dev }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Backup current assets before overwriting (Blue/Green rollback target)
          ssh root@$SERVER_IP "
            mkdir -p '$NGINX_ROOT' '${NGINX_ROOT}-prev'
            rsync -a --delete '$NGINX_ROOT/' '${NGINX_ROOT}-prev/' 2>/dev/null || true
          "

          # Deploy dist/ only — no source, no node_modules
          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"

          # Verify remoteEntry.js (MFE guard) + nginx reload on VM
          IS_MFE="${{ inputs.is_mfe }}"
          ssh root@$SERVER_IP "bash -s" << VERIFY
            set -e
            if [ "$IS_MFE" = "true" ] && [ ! -f "$NGINX_ROOT/assets/remoteEntry.js" ]; then
              echo "remoteEntry.js missing — restoring backup"
              rsync -a --delete "${NGINX_ROOT}-prev/" "$NGINX_ROOT/"
              exit 1
            fi
            nginx -s reload
            echo "${{ inputs.service_name }} live at $NGINX_ROOT"
          VERIFY

          # Push deploy metric to Pushgateway on Internal Tools VM
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null || true
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"green\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"green\",env=\"dev\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-dev
            " 2>/dev/null || true
          fi

      # ── Staging ──────────────────────────────────────────────────────────
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/qa'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          NGINX_ROOT: ${{ inputs.nginx_root_staging }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          ssh root@$SERVER_IP "
            mkdir -p '$NGINX_ROOT' '${NGINX_ROOT}-prev'
            rsync -a --delete '$NGINX_ROOT/' '${NGINX_ROOT}-prev/' 2>/dev/null || true
          "

          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"

          IS_MFE="${{ inputs.is_mfe }}"
          ssh root@$SERVER_IP "bash -s" << VERIFY
            set -e
            if [ "$IS_MFE" = "true" ] && [ ! -f "$NGINX_ROOT/assets/remoteEntry.js" ]; then
              echo "remoteEntry.js missing — restoring backup"
              rsync -a --delete "${NGINX_ROOT}-prev/" "$NGINX_ROOT/"
              exit 1
            fi
            nginx -s reload
          VERIFY

          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          if [ -n "$TOOLS" ]; then
            ssh-keyscan -H $TOOLS >> ~/.ssh/known_hosts 2>/dev/null || true
            TS=$(date -u +%s)
            ssh root@$TOOLS "
              printf 'deploy_active_slot{service=\"${{ inputs.service_name }}\",slot=\"green\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} 1\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
              printf 'deploy_timestamp{service=\"${{ inputs.service_name }}\",slot=\"green\",env=\"staging\",commit=\"${GITHUB_SHA:0:8}\"} ${TS}\n' | \
                curl -s --data-binary @- http://localhost:9091/metrics/job/deploy/instance/${{ inputs.service_name }}-staging
            " 2>/dev/null || true
          fi

      - name: Push build metrics
        if: always()
        continue-on-error: true
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timing.outputs.start }} ))
          STATUS="${{ job.status }}"
          TOOLS=${{ secrets.INTERNAL_TOOLS_VM }}
          ssh root@$TOOLS "
            printf 'ci_build_duration_seconds{service=\"${{ inputs.service_name }}\",env=\"${{ github.ref_name }}\",status=\"${STATUS}\"} ${DURATION}\n' | \
              curl -s --data-binary @- http://localhost:9091/metrics/job/ci/instance/${{ inputs.service_name }}
          " 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "Service: ${{ inputs.service_name }} | Branch: ${{ github.ref_name }} | Status: ${{ job.status }}"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only — does NOT change the gate → build → deploy flow (Rule 0).
  # Runs after all jobs regardless of outcome, so gate failures are reported too.
  # No-ops silently when NOTIFY_WEBHOOK_URL is unset; never fails the pipeline.
  notify:
    name: Notify Teams
    needs: [gate, build-deploy]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post pipeline result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${GITHUB_SHA:0:8}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ inputs.service_name }} — pipeline ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }}", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${STATUS}" },
                    { "title": "Branch", "value": "${{ github.ref_name }}" },
                    { "title": "Commit", "value": "${SHA}" },
                    { "title": "Trigger", "value": "${{ github.event_name }}" }
                  ] }
                ],
                "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }]
              }
            }]
          }
          JSON
