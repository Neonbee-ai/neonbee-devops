# =============================================================================
# Neonbee — HA Standby Bootstrap (one-time provisioning, workflow_dispatch only)
# =============================================================================
# Run ONCE to prepare the Dev VM (84.247.131.148) as the warm standby.
#
# Prerequisites (manual, before running this workflow):
#   1. Copy /etc/ssl/cloudflare/neonbee.app.crt and neonbee.app.key from prod VM
#      to /etc/ssl/cloudflare/ on Dev VM
#   2. Confirm nvm + Node 22 is installed on Dev VM
# =============================================================================

name: "Bootstrap HA Standby VM"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap:
    runs-on: [self-hosted, contabo]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}
            ${{ secrets.CONTABO_SSH_KEY }}

      - name: Scan known hosts
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh-keyscan -H 68.183.86.248 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          ssh root@68.183.86.248 "ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null || true"

      - name: Verify HA VM connectivity
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          [ -z "$HA_IP" ] && echo "ERROR: HA_VM_IP secret is not set" && exit 1
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          ssh root@$HA_IP "echo 'HA VM reachable: $(hostname)'"

      - name: Check port availability on HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            CONFLICTS=\$(netstat -tlnp 2>/dev/null | grep -E ':(800[0-9]|801[0-9]|802[0-9]|803[0-9]|804[0-9]) ' || true)
            if [ -n \"\$CONFLICTS\" ]; then
              echo 'WARNING: Some 8xxx ports already in use:'
              echo \"\$CONFLICTS\"
            else
              echo 'All 8xxx ports are free'
            fi
          "

      - name: Create web root directories
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            set -e
            mkdir -p /var/www/cdn.neonbee.app/html/{crm,inventory,accounting,projects,timesheet,dailystore-admin,people,neura,flow,insight,inbox,support,fulfillment,forms,manufacturing,documents,sign,chat,p}
            mkdir -p /var/www/dashboard.neonbee.app/html
            mkdir -p /var/www/sso.neonbee.app/html
            echo 'Web root directories ready'
          "

      - name: Copy Cloudflare cert from Prod → HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "mkdir -p /etc/ssl/cloudflare"
          # Copy cert files from Prod VM to HA VM via agent-forwarded SSH
          ssh -A root@68.183.86.248 "
            rsync -az -e 'ssh -o StrictHostKeyChecking=no' \
              /etc/ssl/cloudflare/neonbee.app.crt \
              /etc/ssl/cloudflare/neonbee.app.key \
              root@$HA_IP:/etc/ssl/cloudflare/
          "
          ssh root@$HA_IP "
            openssl x509 -in /etc/ssl/cloudflare/neonbee.app.crt -noout -subject -dates
            echo 'Cloudflare origin cert installed on HA VM'
          "

      - name: Install nginx (if not present)
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            if ! command -v nginx &>/dev/null; then
              apt-get update -q && apt-get install -y nginx
              echo 'nginx installed'
            else
              echo \"nginx already present: \$(nginx -v 2>&1)\"
            fi
            systemctl enable nginx
          "

      - name: Create nginx api-proxy-headers snippet
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            mkdir -p /etc/nginx/snippets
            if [ ! -f /etc/nginx/snippets/api-proxy-headers.conf ]; then
              printf '%s\n' \
                'proxy_set_header Host \$host;' \
                'proxy_set_header X-Real-IP \$remote_addr;' \
                'proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;' \
                'proxy_set_header X-Forwarded-Proto \$scheme;' \
                'proxy_read_timeout 30s;' \
                > /etc/nginx/snippets/api-proxy-headers.conf
              echo 'Created api-proxy-headers.conf'
            else
              echo 'api-proxy-headers.conf already exists'
            fi
          "

      - name: Deploy HA nginx configs
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          for conf in nginx/ha-api.neonbee.app.conf nginx/ha-cdn.neonbee.app.conf nginx/ha-dashboard.neonbee.app.conf nginx/ha-sso.neonbee.app.conf; do
            DEST_NAME=$(basename $conf | sed 's/^ha-//')
            rsync -avz "$conf" "root@$HA_IP:/etc/nginx/sites-available/$DEST_NAME"
            echo "Deployed $conf -> /etc/nginx/sites-available/$DEST_NAME"
          done
          ssh root@$HA_IP "
            set -e
            cd /etc/nginx/sites-enabled
            for conf in api.neonbee.app.conf cdn.neonbee.app.conf dashboard.neonbee.app.conf sso.neonbee.app.conf; do
              [ -f /etc/nginx/sites-available/\$conf ] && ln -sf /etc/nginx/sites-available/\$conf \$conf || true
            done
            nginx -t && nginx -s reload
            echo 'nginx reloaded with HA configs'
          "

      - name: Verify nvm + Node 22
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            nvm use 22 && echo \"Node: \$(node -v) | npm: \$(npm -v)\" || echo 'WARNING: nvm/node 22 not found'
          "

      - name: Summary
        if: always()
        run: |
          echo "Bootstrap complete. Next steps:"
          echo "  1. Trigger so360-core prod deploy to populate HA backends"
          echo "  2. Run Setup Cloudflare Load Balancer workflow"

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only. Runs after the job regardless of outcome. No-ops when
  # NOTIFY_WEBHOOK_URL is unset; never fails the workflow.
  notify:
    name: Notify Teams
    needs: [bootstrap]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="D93F0B"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="A0A0A0"
          else
            STATUS="SUCCESS"; COLOR="2EB886"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "${COLOR}",
            "summary": "${{ github.workflow }} ${STATUS}",
            "sections": [{
              "activityTitle": "${{ github.workflow }} — ${STATUS}",
              "activitySubtitle": "${{ github.repository }} @ ${{ github.ref_name }}",
              "facts": [
                { "name": "Status", "value": "${STATUS}" },
                { "name": "Workflow", "value": "${{ github.workflow }}" },
                { "name": "Trigger", "value": "${{ github.event_name }}" },
                { "name": "Actor", "value": "${{ github.actor }}" }
              ],
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View run",
              "targets": [{ "os": "default", "uri": "${RUN_URL}" }]
            }]
          }
          JSON
