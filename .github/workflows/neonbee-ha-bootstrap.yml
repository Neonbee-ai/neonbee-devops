# =============================================================================
# Neonbee — HA Standby Bootstrap (one-time provisioning, workflow_dispatch only)
# =============================================================================
# Run ONCE to prepare the Dev VM (84.247.131.148) as the warm standby.
# This is NOT part of the regular CI/CD pipeline — it provisions nginx configs,
# creates web root directories, and deploys Cloudflare origin certs.
#
# Prerequisites (manual, before running this workflow):
#   1. Copy /etc/ssl/cloudflare/neonbee.app.crt and neonbee.app.key from prod VM
#      to the same path on Dev VM (same wildcard cert, already owned by neonbee-devops)
#   2. Confirm ports 8000-8044 are free on Dev VM: ssh root@84.247.131.148 "netstat -tlnp | grep ':80[0-4]'"
#   3. Confirm nvm + Node 22 is installed on Dev VM
# =============================================================================

name: "Bootstrap HA Standby VM"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would be done without applying changes'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap:
    runs-on: [self-hosted, contabo]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Verify HA VM connectivity
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          [ -z "$HA_IP" ] && echo "ERROR: HA_VM_IP secret is not set" && exit 1
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          ssh root@$HA_IP "echo 'HA VM reachable: $(hostname)'"

      - name: Check port availability on HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          echo "Checking 8xxx ports on HA VM..."
          ssh root@$HA_IP "
            CONFLICTS=\$(netstat -tlnp 2>/dev/null | grep -E ':80[0-9]{2}' | grep -v '127.0.0.1:60|127.0.0.1:61|127.0.0.1:62|127.0.0.1:63|127.0.0.1:64' || true)
            if [ -n \"\$CONFLICTS\" ]; then
              echo 'WARNING: Some 8xxx ports already in use:'
              echo \"\$CONFLICTS\"
            else
              echo 'All 8xxx ports are free'
            fi
          "

      - name: Create web root directories on HA VM
        if: inputs.dry_run != true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            set -e
            mkdir -p /var/www/cdn.neonbee.app/html/{crm,inventory,accounting,projects,timesheet,dailystore-admin,people,neura,flow,insight,inbox,support,fulfillment,forms,manufacturing,documents,sign,chat,p}
            mkdir -p /var/www/dashboard.neonbee.app/html
            mkdir -p /var/www/sso.neonbee.app/html
            echo 'Web root directories created'
          "

      - name: Verify Cloudflare cert on HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            if [ -f /etc/ssl/cloudflare/neonbee.app.crt ] && [ -f /etc/ssl/cloudflare/neonbee.app.key ]; then
              echo 'Cloudflare origin cert present'
              openssl x509 -in /etc/ssl/cloudflare/neonbee.app.crt -noout -subject -dates 2>/dev/null || true
            else
              echo 'ERROR: Cloudflare origin cert missing at /etc/ssl/cloudflare/'
              echo 'Copy from prod VM before proceeding:'
              echo '  scp root@68.183.86.248:/etc/ssl/cloudflare/neonbee.app.{crt,key} /etc/ssl/cloudflare/'
              exit 1
            fi
          "

      - name: Install nginx on HA VM (if not present)
        if: inputs.dry_run != true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            if ! command -v nginx &>/dev/null; then
              apt-get update -q && apt-get install -y nginx
              echo 'nginx installed'
            else
              echo 'nginx already installed: $(nginx -v 2>&1)'
            fi
            systemctl enable nginx
          "

      - name: Deploy HA nginx configs to HA VM
        if: inputs.dry_run != true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          for conf in nginx/ha-api.neonbee.app.conf nginx/ha-cdn.neonbee.app.conf nginx/ha-dashboard.neonbee.app.conf nginx/ha-sso.neonbee.app.conf; do
            rsync -avz "$conf" "root@$HA_IP:/etc/nginx/sites-available/$(basename $conf | sed 's/^ha-//')"
            echo "Deployed $conf → /etc/nginx/sites-available/$(basename $conf | sed 's/^ha-//')"
          done

          ssh root@$HA_IP "
            set -e
            cd /etc/nginx/sites-enabled
            for conf in api.neonbee.app.conf cdn.neonbee.app.conf dashboard.neonbee.app.conf sso.neonbee.app.conf; do
              [ -f /etc/nginx/sites-available/\$conf ] && ln -sf /etc/nginx/sites-available/\$conf \$conf || true
            done
            nginx -t
            nginx -s reload
            echo 'nginx reloaded with HA configs'
          "

      - name: Create nginx snippets on HA VM (if missing)
        if: inputs.dry_run != true
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            mkdir -p /etc/nginx/snippets
            if [ ! -f /etc/nginx/snippets/api-proxy-headers.conf ]; then
              cat > /etc/nginx/snippets/api-proxy-headers.conf << 'SNIPPET'
proxy_set_header Host \$host;
proxy_set_header X-Real-IP \$remote_addr;
proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto \$scheme;
proxy_read_timeout 30s;
SNIPPET
              echo 'Created api-proxy-headers.conf snippet'
            else
              echo 'api-proxy-headers.conf snippet already exists'
            fi
          "

      - name: Verify nvm + Node 22 on HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            if command -v nvm &>/dev/null; then
              nvm use 22 && echo \"Node: \$(node -v) | npm: \$(npm -v)\"
            else
              echo 'ERROR: nvm not found — install Node 22 manually on HA VM'
              exit 1
            fi
          "

      - name: Summary
        if: always()
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          echo "Bootstrap complete for HA VM: $HA_IP"
          echo "Next steps:"
          echo "  1. Add HA_VM_IP org secret = 84.247.131.148 (if not done)"
          echo "  2. Add CONTABO_SSH_KEY org secret (if not done)"
          echo "  3. Push a commit to any service repo to trigger the first HA deploy"
          echo "  4. Configure Cloudflare Load Balancer origin pools (see plan Phase 3)"
