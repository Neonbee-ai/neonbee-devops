# =============================================================================
# Neonbee — HA Env Sync (workflow_dispatch)
# =============================================================================
# Rsyncs all .env files directly from Prod VM → HA VM (agent-forwarded rsync),
# then restarts all 22 PM2 processes with the correct PORT.
#
# Why rsync instead of selective patching:
#   Prod .env files contain cross-service URL vars (CORE_SERVICE_URL,
#   TIMESHEET_SERVICE_URL, etc.) that the populate workflow never writes.
#   Without these, modules fall back to dev-port defaults and cannot reach
#   each other → 403 "Core API unreachable". Full rsync captures everything.
#
#   Prod and HA use identical 8xxx ports, so Prod .env files are correct
#   for HA with no modification.
# =============================================================================

name: "HA Standby — Patch Missing Env Vars"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROD_IP: '68.183.86.248'

jobs:
  patch:
    runs-on: [self-hosted, contabo]
    timeout-minutes: 10
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}
            ${{ secrets.CONTABO_SSH_KEY }}

      - name: Scan known hosts
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh-keyscan -H ${{ env.PROD_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null
          # Allow Prod VM to reach HA VM directly for rsync
          ssh root@${{ env.PROD_IP }} "ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null || true"

      - name: Rsync .env files Prod → HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          # Use agent-forwarded SSH: rsync runs on Prod VM, pushes to HA VM directly
          ssh -A root@${{ env.PROD_IP }} "
            SYNCED=0
            SKIPPED=0
            for DIR in /github/neonbee/so360-*; do
              [ -f \"\$DIR/.env\" ] || { SKIPPED=\$((SKIPPED+1)); continue; }
              rsync -az --no-perms -e 'ssh -o StrictHostKeyChecking=no' \
                \"\$DIR/.env\" \"root@$HA_IP:\$DIR/.env\" && \
                echo \"Synced \$(basename \$DIR)/.env\" && SYNCED=\$((SYNCED+1)) || \
                echo \"WARN: failed \$DIR/.env\"
            done
            echo \"Done: \$SYNCED synced, \$SKIPPED skipped (no .env on prod)\"
          "

      - name: Restart all HA services with correct PORT
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh root@$HA_IP "bash -s" << 'RESTART'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            SERVICES=(
              'core-ha:8000' 'crm-ha:8003' 'inventory-ha:8006' 'accounting-ha:8008'
              'projects-ha:8010' 'timesheet-ha:8012' 'people-connect-ha:8015'
              'inbox-ha:8017' 'neura-ha:8018' 'flow-ha:8021' 'insight-ha:8023'
              'subscription-ha:8026' 'forms-ha:8027' 'dailystore-ha:8029'
              'fulfillment-ha:8032' 'support-ha:8033' 'manufacturing-ha:8034'
              'chat-ha:8036' 'documents-ha:8037' 'sign-ha:8038'
              'mobility-ha:8040' 'folio-ha:8044'
            )
            for SVC in "${SERVICES[@]}"; do
              NAME=${SVC%%:*}; PORT=${SVC##*:}
              PORT=$PORT pm2 restart "$NAME" --update-env 2>/dev/null && \
                echo "Restarted $NAME :$PORT" || echo "SKIP $NAME"
            done

            pm2 save
            echo "Restart complete"
          RESTART

      - name: Verify services are up
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          sleep 20
          ssh root@$HA_IP "
            echo '=== Port check ==='
            for PORT in 8000 8003 8006 8008 8010 8012 8015 8017 8021 8026 8029 8037; do
              ss -tlnp | grep -q \":\$PORT \" && echo \"OK :\$PORT\" || echo \"FAIL :\$PORT\"
            done
          "

  # ── Notify: Microsoft Teams webhook on completion ───────────────────────────
  # Additive only. Runs after the job regardless of outcome. No-ops when
  # NOTIFY_WEBHOOK_URL is unset; never fails the workflow.
  notify:
    name: Notify Teams
    needs: [patch]
    if: always()
    runs-on: [self-hosted, contabo]
    steps:
      - name: Post result to Teams
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "NOTIFY_WEBHOOK_URL not set — skipping notification"; exit 0; fi
          if ${{ contains(needs.*.result, 'failure') }}; then
            STATUS="FAILURE"; COLOR="Attention"
          elif ${{ contains(needs.*.result, 'cancelled') }}; then
            STATUS="CANCELLED"; COLOR="Warning"
          else
            STATUS="SUCCESS"; COLOR="Good"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -H 'Content-Type: application/json' --data @- "$HOOK" <<JSON || echo "Teams notify failed (non-fatal)"
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  { "type": "TextBlock", "size": "Large", "weight": "Bolder", "color": "${COLOR}", "text": "${{ github.workflow }} — ${STATUS}", "wrap": true },
                  { "type": "TextBlock", "text": "${{ github.repository }} @ ${{ github.ref_name }}", "isSubtle": true, "spacing": "None", "wrap": true },
                  { "type": "FactSet", "facts": [
                    { "title": "Status", "value": "${STATUS}" },
                    { "title": "Workflow", "value": "${{ github.workflow }}" },
                    { "title": "Trigger", "value": "${{ github.event_name }}" },
                    { "title": "Actor", "value": "${{ github.actor }}" }
                  ] }
                ],
                "actions": [{ "type": "Action.OpenUrl", "title": "View run", "url": "${RUN_URL}" }]
              }
            }]
          }
          JSON
