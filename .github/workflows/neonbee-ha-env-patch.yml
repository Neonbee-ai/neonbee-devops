# =============================================================================
# Neonbee — HA Env Patch (workflow_dispatch)
# =============================================================================
# Reads missing env vars from Prod VM and writes them to HA VM .env files,
# then restarts affected PM2 processes.
# =============================================================================

name: "HA Standby — Patch Missing Env Vars"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROD_IP: '68.183.86.248'

jobs:
  patch:
    runs-on: [self-hosted, contabo]
    timeout-minutes: 10
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.DIGITALOCEAN_SSH_KEY }}
            ${{ secrets.CONTABO_SSH_KEY }}

      - name: Scan known hosts
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          ssh-keyscan -H ${{ env.PROD_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -H $HA_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Read missing secrets from Prod VM + patch HA VM
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          # Read the two missing keys from prod VM
          DOCS_KEY=$(ssh root@${{ env.PROD_IP }} "grep '^DOCS_INTERNAL_SERVICE_KEY=' /github/neonbee/so360-core/.env 2>/dev/null | cut -d= -f2-")
          CHANNEL_KEY=$(ssh root@${{ env.PROD_IP }} "grep '^CHANNEL_ENCRYPTION_KEY=' /github/neonbee/so360-dailystore-admin-be/.env 2>/dev/null | cut -d= -f2-")

          echo "DOCS_KEY present: $([ -n "$DOCS_KEY" ] && echo yes || echo MISSING)"
          echo "CHANNEL_KEY present: $([ -n "$CHANNEL_KEY" ] && echo yes || echo MISSING)"

          [ -z "$DOCS_KEY" ] && echo "ERROR: DOCS_INTERNAL_SERVICE_KEY not found on prod" && exit 1
          [ -z "$CHANNEL_KEY" ] && echo "WARNING: CHANNEL_ENCRYPTION_KEY not found on prod — skipping dailystore patch"

          echo "::add-mask::$DOCS_KEY"
          echo "::add-mask::$CHANNEL_KEY"

          # Patch HA VM — append missing keys + restart affected services
          ssh root@$HA_IP "bash -s" << PATCH
            export NVM_DIR="\$HOME/.nvm"
            [ -s "\$NVM_DIR/nvm.sh" ] && \. "\$NVM_DIR/nvm.sh"
            nvm use 22

            DOCS_KEY="$DOCS_KEY"
            CHANNEL_KEY="$CHANNEL_KEY"

            # Services needing DOCS_INTERNAL_SERVICE_KEY
            for DIR in /github/neonbee/so360-core \
                       /github/neonbee/so360-crm-be \
                       /github/neonbee/so360-accounting-be \
                       /github/neonbee/so360-projects-be \
                       /github/neonbee/so360-documents-be; do
              [ -f "\$DIR/.env" ] || continue
              grep -q '^DOCS_INTERNAL_SERVICE_KEY=' "\$DIR/.env" && \
                sed -i "s|^DOCS_INTERNAL_SERVICE_KEY=.*|DOCS_INTERNAL_SERVICE_KEY=\$DOCS_KEY|" "\$DIR/.env" || \
                echo "DOCS_INTERNAL_SERVICE_KEY=\$DOCS_KEY" >> "\$DIR/.env"
              echo "Patched DOCS_INTERNAL_SERVICE_KEY in \$DIR"
            done

            # dailystore needs CHANNEL_ENCRYPTION_KEY (skip if not on prod)
            if [ -n "$CHANNEL_KEY" ]; then
              DIR=/github/neonbee/so360-dailystore-admin-be
              if [ -f "\$DIR/.env" ]; then
                grep -q '^CHANNEL_ENCRYPTION_KEY=' "\$DIR/.env" && \
                  sed -i "s|^CHANNEL_ENCRYPTION_KEY=.*|CHANNEL_ENCRYPTION_KEY=\$CHANNEL_KEY|" "\$DIR/.env" || \
                  echo "CHANNEL_ENCRYPTION_KEY=\$CHANNEL_KEY" >> "\$DIR/.env"
                echo "Patched CHANNEL_ENCRYPTION_KEY in \$DIR"
              fi
            else
              echo "SKIP dailystore CHANNEL_ENCRYPTION_KEY (not set on prod)"
            fi

            # Restart affected services
            for NAME in core-ha crm-ha accounting-ha projects-ha documents-ha dailystore-ha; do
              pm2 restart "\$NAME" --update-env 2>/dev/null && echo "Restarted \$NAME" || echo "SKIP \$NAME"
            done
            pm2 save
            echo "Patch complete"
          PATCH

      - name: Verify services are up
        env:
          HA_IP: ${{ secrets.HA_VM_IP }}
        run: |
          sleep 20
          ssh root@$HA_IP "
            echo '=== Port check ==='
            for PORT in 8000 8003 8008 8010 8029 8037; do
              ss -tlnp | grep -q \":\$PORT \" && echo \"OK :\$PORT\" || echo \"FAIL :\$PORT\"
            done
          "
