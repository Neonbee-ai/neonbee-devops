upstream core_be_prod         { server 127.0.0.1:8000; keepalive 32; }
upstream crm_be_prod          { server 127.0.0.1:8003; keepalive 32; }
upstream inventory_be_prod    { server 127.0.0.1:8006; keepalive 32; }
upstream accounting_be_prod   { server 127.0.0.1:8008; keepalive 32; }
upstream projects_be_prod     { server 127.0.0.1:8010; keepalive 32; }
upstream timesheet_be_prod    { server 127.0.0.1:8012; keepalive 32; }
upstream people_be_prod       { server 127.0.0.1:8015; keepalive 32; }
upstream inbox_be_prod        { server 127.0.0.1:8017; keepalive 32; }
upstream neura_be_prod        { server 127.0.0.1:8018; keepalive 32; }
upstream storefront_api_prod  { server 167.71.226.224:8020; keepalive 32; }
upstream flow_be_prod         { server 127.0.0.1:8021; keepalive 32; }
upstream insight_be_prod      { server 127.0.0.1:8023; keepalive 32; }
upstream subscription_be_prod { server 127.0.0.1:8026; keepalive 32; }
upstream forms_be_prod        { server 127.0.0.1:8027; keepalive 32; }
upstream dailystore_be_prod   { server 127.0.0.1:8029; keepalive 32; }
upstream fulfillment_be_prod  { server 127.0.0.1:8032; keepalive 32; }
upstream support_be_prod      { server 127.0.0.1:8033; keepalive 32; }
upstream manufacturing_be_prod { server 127.0.0.1:8034; keepalive 32; }
upstream chat_be_prod         { server 127.0.0.1:8036; keepalive 32; }
upstream documents_be_prod    { server 127.0.0.1:8037; keepalive 32; }
upstream sign_be_prod         { server 127.0.0.1:8038; keepalive 32; }
upstream mobility_be_prod  { server 127.0.0.1:8040; keepalive 32; }

server {
    listen 80; listen [::]:80;
    server_name api.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name api.neonbee.app;
    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    access_log /var/log/nginx/api.neonbee.app-access.log;
    error_log  /var/log/nginx/api.neonbee.app-error.log;
    client_max_body_size 50M;

    location = / {
        return 200 '{"service":"NeonBee API Gateway","version":"2.0","environment":"production"}';
        add_header Content-Type application/json;
    }

    location /core/          { rewrite ^/core/(.*)          /$1 break; proxy_pass http://core_be_prod;          include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /crm/           { rewrite ^/crm/(.*)           /$1 break; proxy_pass http://crm_be_prod;           include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /inventory/     { rewrite ^/inventory/(.*)     /$1 break; proxy_pass http://inventory_be_prod;     include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /accounting/    { rewrite ^/accounting/(.*)    /$1 break; proxy_pass http://accounting_be_prod;    include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /projects/      { rewrite ^/projects/(.*)      /$1 break; proxy_pass http://projects_be_prod;      include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /timesheet/     { rewrite ^/timesheet/(.*)     /$1 break; proxy_pass http://timesheet_be_prod;     include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /people/        { rewrite ^/people/(.*)        /$1 break; proxy_pass http://people_be_prod;        include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /inbox/         { rewrite ^/inbox/(.*)         /$1 break; proxy_pass http://inbox_be_prod;         include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; }
    location /neura/         { rewrite ^/neura/(.*)         /$1 break; proxy_pass http://neura_be_prod;         include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /storefront/    { rewrite ^/storefront/(.*)    /$1 break; proxy_pass http://storefront_api_prod;   include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /flow/          { rewrite ^/flow/(.*)          /$1 break; proxy_pass http://flow_be_prod;          include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /insight/       { rewrite ^/insight/(.*)       /$1 break; proxy_pass http://insight_be_prod;       include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /subscription/  { rewrite ^/subscription/(.*)  /$1 break; proxy_pass http://subscription_be_prod;  include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /forms/         { rewrite ^/forms/(.*)         /$1 break; proxy_pass http://forms_be_prod;         include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /dailystore/    { rewrite ^/dailystore/(.*)    /$1 break; proxy_pass http://dailystore_be_prod;    include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /fulfillment/   { rewrite ^/fulfillment/(.*)   /$1 break; proxy_pass http://fulfillment_be_prod;   include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /support/       { rewrite ^/support/(.*)       /$1 break; proxy_pass http://support_be_prod;       include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /manufacturing/ { rewrite ^/manufacturing/(.*)  /$1 break; proxy_pass http://manufacturing_be_prod; include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /documents/     { rewrite ^/documents/(.*)     /$1 break; proxy_pass http://documents_be_prod;     include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /sign/          { rewrite ^/sign/(.*)          /$1 break; proxy_pass http://sign_be_prod;          include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /mobility/   { rewrite ^/mobility/(.*)   /$1 break; proxy_pass http://mobility_be_prod;  include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /chat/          { rewrite ^/chat/(.*)          /$1 break; proxy_pass http://chat_be_prod;          include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; }
}
