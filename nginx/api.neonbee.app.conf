# api.neonbee.app — Production API Gateway
# Nginx configuration for Neonbee production API gateway.
# Handles CORS (including OPTIONS preflight) at gateway level.
# Backend CORS headers are stripped to prevent duplication.

# ── Origin allowlist ──────────────────────────────────────────────────────────
# Returns the Origin header value for allowed origins; empty string otherwise.
# Empty string causes nginx to omit the ACAO header (correct browser behaviour).
map $http_origin $neonbee_cors_origin {
    default                    "";
    ~*neonbee\.app             $http_origin;
    ~*skyoffice360\.com        $http_origin;
    ~*localhost                $http_origin;
    ~*127\.0\.0\.1             $http_origin;
    ~*192\.168\.                $http_origin;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.neonbee.app;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.neonbee.app;

    # SSL — managed by Certbot; paths injected automatically
    # ssl_certificate     /etc/letsencrypt/live/api.neonbee.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.neonbee.app/privkey.pem;

    # Logging
    access_log /var/log/nginx/api-prod-access.log;
    error_log  /var/log/nginx/api-prod-error.log;

    # Security headers
    add_header X-Frame-Options        "DENY"              always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── CORS preflight — respond immediately, never proxy OPTIONS ─────────────
    # This is the key fix: browsers send OPTIONS before every cross-origin
    # request. If we let it reach the backend, CORS headers may duplicate or
    # arrive too late. Return 204 here so the real request can follow.
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin      $neonbee_cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Tenant-Id, X-Org-Id, X-User-Id, access-token, X-Requested-With, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           1728000;
        add_header Content-Type                     "text/plain; charset=utf-8";
        add_header Content-Length                   0;
        return 204;
    }

    # ── CORS headers for all non-OPTIONS responses ────────────────────────────
    add_header Access-Control-Allow-Origin      $neonbee_cors_origin always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Tenant-Id, X-Org-Id, X-User-Id, access-token, X-Requested-With, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers    "Content-Disposition" always;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin            $http_origin;
    proxy_cache_bypass                 $http_upgrade;
    proxy_read_timeout    300s;
    proxy_connect_timeout  75s;

    # Strip upstream CORS headers — prevents duplicate headers since nginx
    # adds its own above. Both nginx and NestJS set these; proxy_hide_header
    # removes the upstream copy first.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    # ── Route: Core ───────────────────────────────────────────────────────────
    location /core/ {
        rewrite ^/core/(.*) /$1 break;
        proxy_pass http://localhost:3000;
    }

    # ── Route: CRM ────────────────────────────────────────────────────────────
    location /crm/ {
        rewrite ^/crm/(.*) /$1 break;
        proxy_pass http://localhost:3001;
    }

    # ── Route: Inventory ──────────────────────────────────────────────────────
    location /inventory/ {
        rewrite ^/inventory/(.*) /$1 break;
        proxy_pass http://localhost:3006;
    }

    # ── Route: People Connect ─────────────────────────────────────────────────
    location /people/ {
        rewrite ^/people/(.*) /$1 break;
        proxy_pass http://localhost:3007;
    }

    # ── Route: Accounting ─────────────────────────────────────────────────────
    location /accounting/ {
        rewrite ^/accounting/(.*) /$1 break;
        proxy_pass http://localhost:3008;
    }

    # ── Route: Projects (Pulse) ───────────────────────────────────────────────
    location /projects/ {
        rewrite ^/projects/(.*) /$1 break;
        proxy_pass http://localhost:3009;
    }

    # ── Route: Timesheet ──────────────────────────────────────────────────────
    location /timesheet/ {
        rewrite ^/timesheet/(.*) /$1 break;
        proxy_pass http://localhost:3011;
    }

    # ── Route: Daily Store ────────────────────────────────────────────────────
    location /dailystore/ {
        rewrite ^/dailystore/(.*) /$1 break;
        proxy_pass http://localhost:3013;
    }

    # ── Route: Neura AI ───────────────────────────────────────────────────────
    location /neura/ {
        rewrite ^/neura/(.*) /$1 break;
        proxy_pass http://localhost:3016;
    }

    # ── Route: Inbox ──────────────────────────────────────────────────────────
    location /inbox/ {
        rewrite ^/inbox/(.*) /$1 break;
        proxy_pass http://localhost:3017;
    }

    # ── Route: Storefront API ─────────────────────────────────────────────────
    location /storefront/ {
        rewrite ^/storefront/(.*) /$1 break;
        proxy_pass http://localhost:3020;
    }

    # ── Route: Flow ───────────────────────────────────────────────────────────
    location /flow/ {
        rewrite ^/flow/(.*) /$1 break;
        proxy_pass http://localhost:3021;
    }

    # ── Route: Insight ────────────────────────────────────────────────────────
    location /insight/ {
        rewrite ^/insight/(.*) /$1 break;
        proxy_pass http://localhost:3022;
    }

    # ── Route: Subscription ───────────────────────────────────────────────────
    location /subscription/ {
        rewrite ^/subscription/(.*) /$1 break;
        proxy_pass http://localhost:3026;
    }

    # ── Route: Forms ──────────────────────────────────────────────────────────
    location /forms/ {
        rewrite ^/forms/(.*) /$1 break;
        proxy_pass http://localhost:3027;
    }

    # ── Route: Fulfillment ────────────────────────────────────────────────────
    location /fulfillment/ {
        rewrite ^/fulfillment/(.*) /$1 break;
        proxy_pass http://localhost:3028;
    }

    # ── Route: Documents ──────────────────────────────────────────────────────────
    location /documents/ {
        rewrite ^/documents/(.*) /$1 break;
        proxy_pass http://localhost:3036;
    }

    # ── Route: Sign ───────────────────────────────────────────────────────────────
    location /sign/ {
        rewrite ^/sign/(.*) /$1 break;
        proxy_pass http://localhost:3038;
    }

    # ── Route: Support ────────────────────────────────────────────────────────
    location /support/ {
        rewrite ^/support/(.*) /$1 break;
        proxy_pass http://localhost:3029;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        return 200 "api.neonbee.app OK\n";
        add_header Content-Type text/plain;
    }

    # ── Root ──────────────────────────────────────────────────────────────────
    location / {
        return 200 '{"gateway":"api.neonbee.app","status":"ok"}';
        add_header Content-Type application/json;
    }
}
