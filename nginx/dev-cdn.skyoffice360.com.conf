# NGINX server block for dev-cdn.skyoffice360.com
# Serves all MFE static dist/ files from a single domain with path-based routing.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name dev-cdn.skyoffice360.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name dev-cdn.skyoffice360.com;

    ssl_certificate /etc/letsencrypt/live/dev-cdn.skyoffice360.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-cdn.skyoffice360.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/dev-cdn.skyoffice360.com/html;

    # CORS headers for Module Federation
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

    # Each MFE location block
    location /crm/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/crm/;
        try_files $uri $uri/ /crm/index.html;
    }
    location /inventory/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/inventory/;
        try_files $uri $uri/ /inventory/index.html;
    }
    location /accounting/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/accounting/;
        try_files $uri $uri/ /accounting/index.html;
    }
    location /projects/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/projects/;
        try_files $uri $uri/ /projects/index.html;
    }
    location /timesheet/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/timesheet/;
        try_files $uri $uri/ /timesheet/index.html;
    }
    location /dailystore-admin/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/dailystore-admin/;
        try_files $uri $uri/ /dailystore-admin/index.html;
    }
    location /people/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/people/;
        try_files $uri $uri/ /people/index.html;
    }
    location /neura/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/neura/;
        try_files $uri $uri/ /neura/index.html;
    }
    location /flow/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/flow/;
        try_files $uri $uri/ /flow/index.html;
    }
    location /insight/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/insight/;
        try_files $uri $uri/ /insight/index.html;
    }
    location /inbox/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/inbox/;
        try_files $uri $uri/ /inbox/index.html;
    }
    location /support/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/support/;
        try_files $uri $uri/ /support/index.html;
    }
    location /fulfillment/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/fulfillment/;
        try_files $uri $uri/ /fulfillment/index.html;
    }
    location /forms/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/forms/;
        try_files $uri $uri/ /forms/index.html;
    }
    location /manufacturing/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/manufacturing/;
        try_files $uri $uri/ /manufacturing/index.html;
    }
    location /documents/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/documents/;
        try_files $uri $uri/ /documents/index.html;
    }
    location /sign/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/sign/;
        try_files $uri $uri/ /sign/index.html;
    }
    location /chat/ {
        alias /var/www/dev-cdn.skyoffice360.com/html/chat/;
        try_files $uri $uri/ /chat/index.html;
    }

    # Cache: no-cache for remoteEntry.js, cache hashed assets
    location ~* /assets/remoteEntry\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Default: 404
    location / {
        return 404;
    }
}
