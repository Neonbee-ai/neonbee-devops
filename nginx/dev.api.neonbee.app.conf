# =====================================================================
# dev.api.neonbee.app — Dev API Gateway
# Mirror of api.neonbee.app with dev-environment upstreams (6xxx ports).
# Target VM: Dev VM (84.247.131.148, SERVER_IP secret).
# DNS: dev.api.neonbee.app A → Dev VM IP (Cloudflare).
# SSL: Let's Encrypt or Cloudflare origin cert for *.neonbee.app.
# =====================================================================

upstream core_be_dev          { server 127.0.0.1:6000; }
upstream crm_be_dev           { server 127.0.0.1:6001; }
upstream inventory_be_dev     { server 127.0.0.1:6006; }
upstream people_be_dev        { server 127.0.0.1:6007; }
upstream accounting_be_dev    { server 127.0.0.1:6008; }
upstream projects_be_dev      { server 127.0.0.1:6010; }
upstream timesheet_be_dev     { server 127.0.0.1:6012; }
upstream dailystore_be_dev    { server 127.0.0.1:6014; }
upstream inbox_be_dev         { server 127.0.0.1:6017; }
upstream neura_be_dev         { server 127.0.0.1:6017; }
upstream storefront_api_dev   { server 127.0.0.1:6020; }
upstream flow_be_dev          { server 127.0.0.1:6021; }
upstream insight_be_dev       { server 127.0.0.1:6023; }
upstream subscription_be_dev  { server 127.0.0.1:6026; }
upstream forms_be_dev         { server 127.0.0.1:6027; }
upstream fulfillment_be_dev   { server 127.0.0.1:6032; }
upstream support_be_dev       { server 127.0.0.1:6033; }
upstream manufacturing_be_dev { server 127.0.0.1:6034; }
upstream documents_be_dev     { server 127.0.0.1:6035; }
upstream chat_be_dev          { server 127.0.0.1:6036; }
upstream sign_be_dev          { server 127.0.0.1:6045; }
upstream mobility_be_dev      { server 127.0.0.1:6042; }

server {
    listen 80; listen [::]:80;
    server_name dev.api.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name dev.api.neonbee.app;
    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    access_log /var/log/nginx/dev.api.neonbee.app-access.log;
    error_log  /var/log/nginx/dev.api.neonbee.app-error.log;
    client_max_body_size 50M;

    location = / {
        return 200 '{"service":"NeonBee API Gateway","version":"2.0","environment":"development"}';
        add_header Content-Type application/json;
    }

    location /core/          { rewrite ^/core/(.*)          /$1 break; proxy_pass http://core_be_dev;          include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /crm/           { rewrite ^/crm/(.*)           /$1 break; proxy_pass http://crm_be_dev;           include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /inventory/     { rewrite ^/inventory/(.*)     /$1 break; proxy_pass http://inventory_be_dev;     include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /accounting/    { rewrite ^/accounting/(.*)    /$1 break; proxy_pass http://accounting_be_dev;    include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /projects/      { rewrite ^/projects/(.*)      /$1 break; proxy_pass http://projects_be_dev;      include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /timesheet/     { rewrite ^/timesheet/(.*)     /$1 break; proxy_pass http://timesheet_be_dev;     include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /people/        { rewrite ^/people/(.*)        /$1 break; proxy_pass http://people_be_dev;        include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /inbox/         { rewrite ^/inbox/(.*)         /$1 break; proxy_pass http://inbox_be_dev;         include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; }
    location /neura/         { rewrite ^/neura/(.*)         /$1 break; proxy_pass http://neura_be_dev;         include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /storefront/    { rewrite ^/storefront/(.*)    /$1 break; proxy_pass http://storefront_api_dev;   include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /flow/          { rewrite ^/flow/(.*)          /$1 break; proxy_pass http://flow_be_dev;          include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /insight/       { rewrite ^/insight/(.*)       /$1 break; proxy_pass http://insight_be_dev;       include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /subscription/  { rewrite ^/subscription/(.*)  /$1 break; proxy_pass http://subscription_be_dev;  include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /forms/         { rewrite ^/forms/(.*)         /$1 break; proxy_pass http://forms_be_dev;         include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /dailystore/    { rewrite ^/dailystore/(.*)    /$1 break; proxy_pass http://dailystore_be_dev;    include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /fulfillment/   { rewrite ^/fulfillment/(.*)   /$1 break; proxy_pass http://fulfillment_be_dev;   include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /support/       { rewrite ^/support/(.*)       /$1 break; proxy_pass http://support_be_dev;       include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /manufacturing/ { rewrite ^/manufacturing/(.*)  /$1 break; proxy_pass http://manufacturing_be_dev; include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /documents/     { rewrite ^/documents/(.*)     /$1 break; proxy_pass http://documents_be_dev;     include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /sign/          { rewrite ^/sign/(.*)          /$1 break; proxy_pass http://sign_be_dev;          include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /mobility/      { rewrite ^/mobility/(.*)      /$1 break; proxy_pass http://mobility_be_dev;      include /etc/nginx/snippets/api-proxy-headers.conf; }
    location /chat/          { rewrite ^/chat/(.*)          /$1 break; proxy_pass http://chat_be_dev;          include /etc/nginx/snippets/api-proxy-headers.conf; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; }
}
