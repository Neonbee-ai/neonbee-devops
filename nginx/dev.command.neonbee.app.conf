# =====================================================================
# dev.command.neonbee.app — Dev Command Center (Super Admin Portal)
# Mirror of command.neonbee.app pointing at port 6040 on the Dev VM.
# Target VM: Dev VM (84.247.131.148, SERVER_IP secret).
# DNS: dev.command.neonbee.app A → Dev VM IP (Cloudflare).
# SSL: Let's Encrypt or Cloudflare origin cert for *.neonbee.app.
# =====================================================================

server {
    listen 80; listen [::]:80;
    server_name dev.command.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name dev.command.neonbee.app;
    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    access_log /var/log/nginx/dev.command.neonbee.app-access.log;
    error_log  /var/log/nginx/dev.command.neonbee.app-error.log;
    client_max_body_size 10M;

    # Next.js app running on port 6040 (so360-command dev)
    location / {
        proxy_pass http://127.0.0.1:6040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js API routes
    location /api/ {
        proxy_pass http://127.0.0.1:6040;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
