# =============================================================================
# ha-cdn.neonbee.app.conf — HA Standby MFE CDN
# Mirror of cdn.neonbee.app.conf for the warm standby on Dev VM (84.247.131.148).
# Uses Cloudflare origin cert (consistent with other Dev VM nginx configs) rather
# than Let's Encrypt (prod uses LE but Dev VM has CF certs already).
# =============================================================================

server {
    listen 80; listen [::]:80;
    server_name cdn.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name cdn.neonbee.app;

    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ha-cdn.neonbee.app-access.log;
    error_log  /var/log/nginx/ha-cdn.neonbee.app-error.log;

    root /var/www/cdn.neonbee.app/html;

    # CORS headers for Module Federation
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

    # ── MFE location blocks ──────────────────────────────────────────────────
    location /crm/ {
        alias /var/www/cdn.neonbee.app/html/crm/;
        try_files $uri $uri/ /crm/index.html;
    }
    location /inventory/ {
        alias /var/www/cdn.neonbee.app/html/inventory/;
        try_files $uri $uri/ /inventory/index.html;
    }
    location /accounting/ {
        alias /var/www/cdn.neonbee.app/html/accounting/;
        try_files $uri $uri/ /accounting/index.html;
    }
    location /projects/ {
        alias /var/www/cdn.neonbee.app/html/projects/;
        try_files $uri $uri/ /projects/index.html;
    }
    location /timesheet/ {
        alias /var/www/cdn.neonbee.app/html/timesheet/;
        try_files $uri $uri/ /timesheet/index.html;
    }
    location /dailystore-admin/ {
        alias /var/www/cdn.neonbee.app/html/dailystore-admin/;
        try_files $uri $uri/ /dailystore-admin/index.html;
    }
    location /people/ {
        alias /var/www/cdn.neonbee.app/html/people/;
        try_files $uri $uri/ /people/index.html;
    }
    location /neura/ {
        alias /var/www/cdn.neonbee.app/html/neura/;
        try_files $uri $uri/ /neura/index.html;
    }
    location /flow/ {
        alias /var/www/cdn.neonbee.app/html/flow/;
        try_files $uri $uri/ /flow/index.html;
    }
    location /insight/ {
        alias /var/www/cdn.neonbee.app/html/insight/;
        try_files $uri $uri/ /insight/index.html;
    }
    location /inbox/ {
        alias /var/www/cdn.neonbee.app/html/inbox/;
        try_files $uri $uri/ /inbox/index.html;
    }
    location /support/ {
        alias /var/www/cdn.neonbee.app/html/support/;
        try_files $uri $uri/ /support/index.html;
    }
    location /fulfillment/ {
        alias /var/www/cdn.neonbee.app/html/fulfillment/;
        try_files $uri $uri/ /fulfillment/index.html;
    }
    location /forms/ {
        alias /var/www/cdn.neonbee.app/html/forms/;
        try_files $uri $uri/ /forms/index.html;
    }
    location /manufacturing/ {
        alias /var/www/cdn.neonbee.app/html/manufacturing/;
        try_files $uri $uri/ /manufacturing/index.html;
    }
    location /documents/ {
        alias /var/www/cdn.neonbee.app/html/documents/;
        try_files $uri $uri/ /documents/index.html;
    }
    location /sign/ {
        alias /var/www/cdn.neonbee.app/html/sign/;
        try_files $uri $uri/ /sign/index.html;
    }
    location /chat/ {
        alias /var/www/cdn.neonbee.app/html/chat/;
        try_files $uri $uri/ /chat/index.html;
    }
    location /p/ {
        alias /var/www/cdn.neonbee.app/html/p/;
        try_files $uri $uri/ /p/index.html;
    }

    # ── Asset caching rules ──────────────────────────────────────────────────

    # remoteEntry.js — never cache (Module Federation must always get latest)
    location ~* /assets/remoteEntry\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # .mjs ES module workers — correct MIME type required
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Hashed static assets — long cache, immutable
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location / {
        return 404;
    }
}
