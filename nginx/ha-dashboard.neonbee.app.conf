# =============================================================================
# ha-dashboard.neonbee.app.conf — HA Standby Shell Frontend (dashboard)
# Serves so360-shell-fe from /var/www/dashboard.neonbee.app/html on Dev VM.
# Populated by neonbee-deploy-prod.yml HA deploy step on every main push.
# =============================================================================

server {
    listen 80; listen [::]:80;
    server_name dashboard.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name dashboard.neonbee.app;

    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ha-dashboard.neonbee.app-access.log;
    error_log  /var/log/nginx/ha-dashboard.neonbee.app-error.log;

    root /var/www/dashboard.neonbee.app/html;
    index index.html;

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # remoteEntry.js — never cache (Module Federation host must always get latest)
    location ~* /assets/remoteEntry\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Hashed static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
