# =============================================================================
# ha-sso.neonbee.app.conf — HA Standby SSO Frontend
# Serves so360-sso-fe from /var/www/sso.neonbee.app/html on Dev VM.
# Populated by neonbee-deploy-prod.yml HA deploy step on every main push.
# =============================================================================

server {
    listen 80; listen [::]:80;
    server_name sso.neonbee.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name sso.neonbee.app;

    ssl_certificate /etc/ssl/cloudflare/neonbee.app.crt;
    ssl_certificate_key /etc/ssl/cloudflare/neonbee.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/ha-sso.neonbee.app-access.log;
    error_log  /var/log/nginx/ha-sso.neonbee.app-error.log;

    root /var/www/sso.neonbee.app/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
