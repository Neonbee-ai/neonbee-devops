# =============================================================================
# neonbee.app.conf — Apex domain
# /forms/* serves the public Forms SPA; everything else redirects to SSO login.
# SSL managed by Certbot — do not remove the Certbot comment markers.
# =============================================================================

server {
    server_name neonbee.app;

    root /var/www/cdn.neonbee.app/html;

    # Public forms — SPA fallback for /forms/public/<token>, /forms/embed, etc.
    location /forms/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /forms/index.html;
    }

    # Apex root and all other paths → SSO login
    location / {
        return 301 https://sso.neonbee.app$request_uri;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/neonbee.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/neonbee.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = neonbee.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name neonbee.app;
    return 404; # managed by Certbot

}
